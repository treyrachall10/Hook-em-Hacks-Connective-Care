<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Vigil</title></head>
<body>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1a1625;--ink2:#3d3555;--ink3:#6b5f8a;--ink4:#a89cc4;--ink5:#d4cce8;
  --canvas:#f7f5fc;--surface:rgba(255,255,255,0.72);--surface2:rgba(255,255,255,0.45);
  --green:#4cc98a;--green-dim:rgba(76,201,138,0.15);--green-border:rgba(76,201,138,0.35);
  --amber:#f0a500;--amber-dim:rgba(240,165,0,0.13);--amber-border:rgba(240,165,0,0.35);
  --red:#f06060;--red-dim:rgba(240,96,96,0.12);--red-border:rgba(240,96,96,0.35);
  --blue:#6098f0;--blue-dim:rgba(96,152,240,0.12);--blue-border:rgba(96,152,240,0.35);
  --purple:#9b6bf0;--purple-dim:rgba(155,107,240,0.12);
  --sleep:#4472c4;--sleep-dim:rgba(68,114,196,0.18);
  --blink:#a89cc4;--wake:#4cc98a;
  --r:14px;--r-sm:8px;--r-lg:20px;
}
body{font-family:'Outfit',sans-serif;background:var(--canvas);color:var(--ink);}
.app{min-height:700px;background:linear-gradient(160deg,#ede8f8 0%,#f4f0fb 30%,#eef4fb 65%,#e8f5ee 100%);}

/* Role select */
.rs-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:700px;gap:0;}
.rs-brand{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.rs-brand-mark{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#9b6bf0,#6098f0);display:flex;align-items:center;justify-content:center;}
.rs-brand-name{font-family:'DM Serif Display',serif;font-size:36px;color:var(--ink);letter-spacing:-0.5px;}
.rs-sub{font-size:13px;color:var(--ink3);margin-bottom:40px;letter-spacing:0.2px;}
.rs-grid{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.rs-card{width:196px;padding:28px 20px 22px;background:rgba(255,255,255,0.65);border:1px solid rgba(255,255,255,0.9);border-radius:22px;backdrop-filter:blur(12px);cursor:pointer;transition:transform 0.18s,box-shadow 0.18s;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;}
.rs-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(100,80,180,0.12);}
.rs-icon{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.rs-title{font-family:'DM Serif Display',serif;font-size:19px;color:var(--ink);}
.rs-desc{font-size:11.5px;color:var(--ink3);line-height:1.6;}
.rs-hint{margin-top:30px;font-size:11px;color:var(--ink4);letter-spacing:0.5px;}

/* Nav */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 22px;border-bottom:1px solid rgba(155,107,240,0.1);background:rgba(255,255,255,0.5);backdrop-filter:blur(14px);}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer;}
.logo-mark{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#9b6bf0,#6098f0);}
.logo-text{font-family:'DM Serif Display',serif;font-size:20px;color:var(--ink);}
.role-pill{padding:3px 11px;border-radius:99px;font-size:11px;font-family:'DM Mono',monospace;letter-spacing:0.5px;}
.rp-patient{background:var(--green-dim);border:1px solid var(--green-border);color:#1e7a4e;}
.rp-family{background:var(--purple-dim);border:1px solid rgba(155,107,240,0.35);color:#5a3aaa;}
.rp-nurse{background:var(--amber-dim);border:1px solid var(--amber-border);color:#7a4a00;}
.tb-right{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--ink3);}
.pulse-dot{width:7px;height:7px;border-radius:50%;}
.pd-green{background:var(--green);animation:breathe 2s infinite;}
.pd-amber{background:var(--amber);animation:breathe 1.4s infinite;}
.pd-blue{background:var(--blue);animation:breathe 2s infinite;}
@keyframes breathe{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(0.7)}}

/* Buttons */
.btn{padding:8px 16px;border-radius:10px;font-size:12px;font-family:'Outfit',sans-serif;cursor:pointer;border:none;transition:opacity 0.15s,transform 0.1s;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,#9b6bf0,#7b4ed8);color:white;}
.btn-primary:hover{opacity:0.88;}
.btn-ghost{background:rgba(255,255,255,0.7);border:1px solid rgba(155,107,240,0.25);color:var(--ink3);}
.btn-green{background:linear-gradient(135deg,#4cc98a,#2ea866);color:white;}
.btn-amber{background:linear-gradient(135deg,#f0a500,#c47d00);color:white;}
.btn-sleep{background:linear-gradient(135deg,#4472c4,#2e55a0);color:white;}

/* Cards */
.gc{background:var(--surface);border:1px solid rgba(255,255,255,0.85);border-radius:var(--r-lg);backdrop-filter:blur(8px);}
.stat-card{padding:12px 14px;background:rgba(255,255,255,0.55);border:1px solid rgba(255,255,255,0.8);border-radius:12px;}
.stat-val{font-family:'DM Serif Display',serif;font-size:28px;color:var(--ink);line-height:1;}
.stat-lbl{font-size:10px;color:var(--ink3);margin-top:3px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.8px;}
.eyebrow{font-size:9.5px;letter-spacing:2.5px;color:var(--ink3);text-transform:uppercase;margin-bottom:10px;font-family:'DM Mono',monospace;}

/* Eye state display */
.eye-state-big{font-family:'DM Serif Display',serif;font-size:32px;color:var(--ink);line-height:1;transition:color 0.3s;}
.eye-state-big.awake{color:#1e7a4e;}
.eye-state-big.asleep{color:#2e55a0;}
.eye-state-big.blinking{color:var(--ink3);}

/* EAR bar */
.ear-bar-wrap{position:relative;height:8px;background:rgba(155,107,240,0.1);border-radius:99px;overflow:visible;margin:6px 0;}
.ear-bar-fill{height:100%;border-radius:99px;transition:width 0.15s,background 0.3s;}
.ear-thresh-line{position:absolute;top:-3px;bottom:-3px;width:2px;border-radius:1px;background:rgba(155,107,240,0.5);}
.ear-thresh-label{position:absolute;top:-18px;font-size:9px;color:var(--ink3);font-family:'DM Mono',monospace;transform:translateX(-50%);}

/* State badge */
.state-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:500;}
.sb-awake{background:var(--green-dim);border:1px solid var(--green-border);color:#1e7a4e;}
.sb-asleep{background:var(--sleep-dim);border:1px solid rgba(68,114,196,0.35);color:#2e55a0;}
.sb-blink{background:var(--amber-dim);border:1px solid var(--amber-border);color:#7a4a00;}
.sb-unknown{background:rgba(168,156,196,0.12);border:1px solid rgba(168,156,196,0.3);color:var(--ink3);}

/* Camera */
.camwrap{border-radius:18px;overflow:hidden;background:#0c0a16;position:relative;display:flex;align-items:center;justify-content:center;}
.cam-overlay-lbl{position:absolute;bottom:10px;left:12px;font-size:9px;letter-spacing:2px;color:rgba(200,190,240,0.4);text-transform:uppercase;font-family:'DM Mono',monospace;}
.cam-rec{position:absolute;top:10px;right:12px;display:flex;align-items:center;gap:4px;}
.rdot{width:5px;height:5px;border-radius:50%;background:#f06060;animation:breathe 1.1s infinite;}
.rtxt{font-size:9px;color:rgba(200,190,240,0.4);letter-spacing:1.5px;font-family:'DM Mono',monospace;}

/* Timeline */
.timeline-wrap{padding:16px 18px;background:var(--surface);border:1px solid rgba(255,255,255,0.85);border-radius:var(--r-lg);}
.timeline-track{height:28px;background:rgba(155,107,240,0.06);border-radius:6px;overflow:hidden;display:flex;position:relative;margin-bottom:6px;}
.tl-segment{height:100%;transition:width 0.3s;position:relative;}
.tl-seg-asleep{background:var(--sleep);opacity:0.85;}
.tl-seg-awake{background:var(--green);opacity:0.75;}
.tl-seg-blink{background:var(--blink);opacity:0.5;}
.tl-seg-unknown{background:rgba(168,156,196,0.25);}
.tl-legend{display:flex;gap:14px;flex-wrap:wrap;}
.tl-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink3);}
.tl-leg-dot{width:10px;height:10px;border-radius:3px;}

/* Sleep stats */
.sleep-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}

/* Alert banners */
.alert-banner{padding:13px 16px;border-radius:14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.ab-green{background:rgba(255,255,255,0.65);border:1.5px solid var(--green-border);}
.ab-amber{background:rgba(255,255,255,0.65);border:1.5px solid var(--amber-border);}
.ab-blue{background:rgba(255,255,255,0.65);border:1.5px solid var(--blue-border);}

/* Events */
.ev-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;}
.ev-item{display:flex;align-items:flex-start;gap:7px;}
.ev-pip{width:5px;height:5px;border-radius:50%;margin-top:5px;flex-shrink:0;}

/* Messages */
.msg-list{display:flex;flex-direction:column;gap:6px;max-height:150px;overflow-y:auto;margin-bottom:8px;}
.mb-me-wrap{display:flex;flex-direction:column;align-items:flex-end;}
.mb-other-wrap{display:flex;flex-direction:column;align-items:flex-start;}
.mb-me{background:linear-gradient(135deg,#9b6bf0,#7b4ed8);color:white;padding:7px 11px;border-radius:12px;border-bottom-right-radius:3px;font-size:12px;line-height:1.5;max-width:88%;}
.mb-other{background:rgba(255,255,255,0.85);color:var(--ink);padding:7px 11px;border-radius:12px;border-bottom-left-radius:3px;font-size:12px;line-height:1.5;max-width:88%;border:1px solid rgba(155,107,240,0.14);}
.mb-nurse{background:rgba(255,243,210,0.9);color:#5a3200;padding:7px 11px;border-radius:12px;border-bottom-left-radius:3px;font-size:12px;line-height:1.5;max-width:88%;border:1px solid rgba(240,165,0,0.22);}
.msg-meta{font-size:10px;color:var(--ink4);margin-top:2px;}
.msg-row{display:flex;gap:6px;margin-top:8px;}
.msg-inp{flex:1;padding:8px 11px;border:1px solid rgba(155,107,240,0.22);border-radius:9px;font-size:12px;background:rgba(255,255,255,0.75);color:var(--ink);font-family:'Outfit',sans-serif;outline:none;}
.msg-inp::placeholder{color:var(--ink4);}

/* Conn chips */
.conn-chip{font-size:11px;padding:3px 9px;border-radius:99px;}
.conn-on{background:var(--green-dim);border:1px solid var(--green-border);color:#1e7a4e;}
.conn-off{background:rgba(168,156,196,0.1);border:1px solid rgba(168,156,196,0.25);color:var(--ink4);}

/* Notif */
.notif-card{padding:10px 13px;display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;}
.notif-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* Priority badges */
.pri-badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:99px;font-size:9.5px;font-family:'DM Mono',monospace;}
.pri-low{background:var(--green-dim);color:#1e7a4e;border:1px solid var(--green-border);}
.pri-med{background:var(--amber-dim);color:#7a4a00;border:1px solid var(--amber-border);}
.pri-high{background:var(--red-dim);color:#7a1e1e;border:1px solid var(--red-border);}
.pri-info{background:var(--blue-dim);color:#1e3e7a;border:1px solid var(--blue-border);}

/* MP chip */
.mp-chip{font-size:9.5px;padding:3px 8px;border-radius:99px;font-family:'DM Mono',monospace;}
.mp-idle{background:rgba(168,156,196,0.12);border:1px solid rgba(168,156,196,0.3);color:var(--ink4);}
.mp-loading{background:var(--amber-dim);border:1px solid var(--amber-border);color:#7a4a00;}
.mp-ready{background:var(--green-dim);border:1px solid var(--green-border);color:#1e7a4e;}
.mp-error{background:var(--red-dim);border:1px solid var(--red-border);color:#7a1e1e;}

/* Gauge circle */
.gauge-svg{overflow:visible;}
</style>

<div class="app" id="app"></div>

<script>
const CH=new BroadcastChannel('vigil_v4');

/* ── EAR landmarks ── */
const LEFT_EYE=[362,385,387,263,373,380];
const RIGHT_EYE=[33,160,158,133,153,144];

/* ── Thresholds ── */
const EAR_OPEN=0.24;
const EAR_BLINK=0.15;
const BLINK_MAX_MS=350;
const SLEEP_CONFIRM_MS=2500;
const WAKE_CONFIRM_MS=600;
const MOTION_ALERT=35;
const MOTION_HIGH=60;

/* ── State ── */
const S={
  role:null,patientName:'George P.',patientRoom:'Room 1',patientWard:'ICU',
  isMonitoring:false,mpStatus:'idle',
  eyeState:'unknown',confidence:0,lastEAR:0,earHistory:[],earSmooth:0,
  lidStart:null,lidOpen:true,blinkCount:0,
  sleepState:'unknown',sleepStateStart:Date.now(),
  segments:[],currentSeg:null,
  totalSleepMs:0,totalAwakeMs:0,
  alertsToday:0,motionAlertsToday:0,sessionStart:null,
  motionLevel:0,motionHistory:[],prevLandmarks:null,lastMotionEvent:0,
  events:[],messages:[],
  notifications:[],nurseNotifications:[],
  patientConnected:false,familyConnected:false,nurseConnected:false,
  familyAlerted:false,nurseAlerted:false,nurseMotionCooldown:0,
  faceMesh:null,mpCamera:null,lastFrame:null,frameCount:0,
  videoCallState:null,
  videoCallUrl:null, // <-- ADD THIS
};

function now(){return Date.now();}
function tsShort(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);}
function ear(lm,idx){const[p1,p2,p3,p4,p5,p6]=idx.map(i=>lm[i]);return(dist(p2,p6)+dist(p3,p5))/(2*dist(p1,p4));}
function fmtDur(ms){const s=Math.round(ms/1000);if(s<60)return s+'s';const m=Math.floor(s/60),r=s%60;return m+'m '+(r>0?r+'s':'');}
function fmtDurMin(ms){return Math.round(ms/60000)+'m';}
function calcMotion(cur,prev){
  if(!prev||!cur)return 0;
  let t=0;[1,4,10,33,61,93,133,152,168,234,263,291,323,356,389,397,454].forEach(i=>{if(cur[i]&&prev[i])t+=dist(cur[i],prev[i]);});
  return Math.min(100,Math.round(t*6000));
}

function transitionSleepState(newState){
  if(S.sleepState===newState)return;
  const old=S.sleepState;
  const duration=now()-S.sleepStateStart;
  if(S.currentSeg){S.currentSeg.end=now();S.currentSeg.dur=duration;S.segments.push({...S.currentSeg});}
  if(old==='asleep')S.totalSleepMs+=duration;
  else if(old==='awake')S.totalAwakeMs+=duration;
  S.sleepState=newState;S.sleepStateStart=now();
  S.currentSeg={state:newState,start:now(),end:null,dur:0};
  const labels={awake:'Patient awake',asleep:'Sleep detected',blinking:'Blink detected',unknown:'Signal lost'};
  addEvent(newState,labels[newState]||newState);broadcastState();
}

function processFrame(lm){
  S.frameCount++;
  const raw=(ear(lm,LEFT_EYE)+ear(lm,RIGHT_EYE))/2;
  S.earHistory.push(raw);if(S.earHistory.length>6)S.earHistory.shift();
  const sm=S.earHistory.reduce((a,b)=>a+b,0)/S.earHistory.length;
  S.lastEAR=+sm.toFixed(3);S.earSmooth=sm;
  S.confidence=Math.min(99,Math.round(Math.abs(sm-((EAR_OPEN+EAR_BLINK)/2))*400+45));
  const lidOpen=sm>EAR_OPEN;const lidClosed=sm<EAR_BLINK;
  const t=now();
  if(lidOpen){
    if(!S.lidOpen){
      const closedDur=t-S.lidStart;
      if(closedDur<=BLINK_MAX_MS){S.blinkCount++;if(S.sleepState!=='asleep')transitionSleepState('awake');else transitionSleepState('blinking');}
    }
    S.lidOpen=true;S.lidStart=null;
    if(S.sleepState==='asleep'){if(!S._wakeStart)S._wakeStart=t;else if(t-S._wakeStart>WAKE_CONFIRM_MS){transitionSleepState('awake');S._wakeStart=null;S.alertsToday++;}}
    else{S._wakeStart=null;if(S.sleepState==='unknown'||S.sleepState==='blinking')transitionSleepState('awake');}
  } else {
    S._wakeStart=null;
    if(S.lidOpen){S.lidOpen=false;S.lidStart=t;}
    if(S.lidStart&&(t-S.lidStart)>SLEEP_CONFIRM_MS){if(S.sleepState!=='asleep')transitionSleepState('asleep');}
    else if(S.lidStart&&(t-S.lidStart)>BLINK_MAX_MS&&(t-S.lidStart)<=SLEEP_CONFIRM_MS){if(S.sleepState==='awake'||S.sleepState==='unknown')transitionSleepState('blinking');}
  }
  const motion=calcMotion(lm,S.prevLandmarks);
  S.prevLandmarks=[...lm];
  S.motionHistory.push(motion);if(S.motionHistory.length>8)S.motionHistory.shift();
  S.motionLevel=Math.round(S.motionHistory.reduce((a,b)=>a+b,0)/S.motionHistory.length);
  if(S.motionLevel>MOTION_ALERT&&(t-S.lastMotionEvent)>8000){S.lastMotionEvent=t;addEvent('motion',(S.motionLevel>MOTION_HIGH?'High':'Elevated')+' movement ('+S.motionLevel+'%)');}
  broadcastState();updatePatientLive();
}

function getTimelineSegments(){
  const segs=[...S.segments];
  if(S.currentSeg)segs.push({...S.currentSeg,end:now(),dur:now()-S.currentSeg.start});
  return segs;
}
function totalSessionMs(){return S.sessionStart?now()-S.sessionStart:0;}
function currentSleepMs(){let t=S.totalSleepMs;if(S.sleepState==='asleep')t+=now()-S.sleepStateStart;return t;}
function currentAwakeMs(){let t=S.totalAwakeMs;if(S.sleepState==='awake')t+=now()-S.sleepStateStart;return t;}
function sleepPct(){const tot=totalSessionMs();return tot>0?Math.round(currentSleepMs()/tot*100):0;}

function broadcastState(){
  const segs=getTimelineSegments();
  CH.postMessage({type:'state_update',
    eyeState:S.sleepState,confidence:S.confidence,lastEAR:S.lastEAR,
    alertsToday:S.alertsToday,motionAlertsToday:S.motionAlertsToday,
    events:S.events.slice(0,30),motionLevel:S.motionLevel,
    segments:segs,totalSleepMs:currentSleepMs(),totalAwakeMs:currentAwakeMs(),
    sessionMs:totalSessionMs(),blinkCount:S.blinkCount,sleepPct:sleepPct()
  });
}

function addEvent(type,text){
  const ev={type,text,time:tsShort(),ts:now()};
  S.events.unshift(ev);if(S.events.length>80)S.events.pop();
  broadcastState();
}

CH.onmessage=e=>{
  const d=e.data;
  if(d.type==='ping')handlePing(d.from);
  if(d.type==='pong')handlePong(d.from);
  if(d.type==='state_update'&&(S.role==='family'||S.role==='nurse')){
    Object.assign(S,{eyeState:d.eyeState,confidence:d.confidence,lastEAR:d.lastEAR,alertsToday:d.alertsToday,motionAlertsToday:d.motionAlertsToday,events:d.events,motionLevel:d.motionLevel,remoteSegments:d.segments,remoteSleepMs:d.totalSleepMs,remoteAwakeMs:d.totalAwakeMs,remoteSessionMs:d.sessionMs,remoteBlinkCount:d.blinkCount,remoteSleepPct:d.sleepPct});
    if(S.role==='family'){
      if(d.eyeState==='awake'&&!S.familyAlerted){S.familyAlerted=true;S.notifications.unshift({id:now(),title:S.patientName+' is awake',sub:'Eyes open · '+tsShort(),color:'var(--green)',ts:tsShort(),type:'awake'});playTone([880,880,1100]);}
      if(d.eyeState==='asleep'&&S.familyAlerted){S.familyAlerted=false;S.videoCallState=null;S.notifications.unshift({id:now(),title:S.patientName+' fell asleep',sub:'Sleep detected · '+tsShort(),color:'var(--blue)',ts:tsShort(),type:'sleep'});}
    }
    if(S.role==='nurse'){
      /* Only fire awake alert on a new awake edge (not already alerted this wake session) */
      if(d.eyeState==='awake'&&S._prevEyeState!=='awake'&&!S.nurseAlerted){
        S.nurseAlerted=true;
        S.nurseNotifications.unshift({id:now(),type:'eye',title:'Awake — '+S.patientName,sub:S.patientRoom+' · '+tsShort(),priority:'medium',ts:tsShort()});
        playTone([660,880]);
      }
      /* Reset nurseAlerted only on a sleep edge so a new wake after sleep fires again */
      if(d.eyeState==='asleep'&&S._prevEyeState!=='asleep'){
        S.nurseAlerted=false;
        S.nurseBannerDismissed=false;
        S.nurseNotifications.unshift({id:now(),type:'sleep',title:'Sleep detected — '+S.patientName,sub:S.patientRoom+' · '+tsShort(),priority:'low',ts:tsShort()});
        playTone([440,330]);
      }
      const t=now();
      if(d.motionLevel>MOTION_ALERT&&(t-S.nurseMotionCooldown)>15000){
        S.nurseMotionCooldown=t;
        const hi=d.motionLevel>MOTION_HIGH;
        S.nurseNotifications.unshift({id:t,type:'motion',title:(hi?'High':'Elevated')+' movement',sub:S.patientName+' · '+d.motionLevel+'% · '+tsShort(),priority:hi?'high':'medium',ts:tsShort()});
        playTone(hi?[440,550,660]:[550,660]);S.motionAlertsToday++;
      }
      S._prevEyeState=d.eyeState;
    }
    render();
  }
  if(d.type==='frame'&&(S.role==='family'||S.role==='nurse')){
    S.lastFrame=d.data;
    setTimeout(()=>drawFeedFrame(S.role==='family'?'familyFeedCanvas':'nurseFeedCanvas'),20);
  }
  if(d.type==='chat'){
    const isMine=d.from===S.role;
    const lbl={patient:'Patient',family:'Family',nurse:'Nurse'}[d.from]||d.from;
    S.messages.push({from:isMine?'me':d.from,label:lbl,text:d.text,time:d.time});
    render();setTimeout(()=>{const ml=document.getElementById('msg-list');if(ml)ml.scrollTop=ml.scrollHeight;},50);
  }
  if(d.type==='video_call_request'&&S.role==='nurse'){
    S.nurseNotifications.unshift({id:now(),type:'videocall',title:'Family video call request',sub:'Family would like to call '+S.patientName+' · '+tsShort(),priority:'high',ts:tsShort()});
    playTone([880,1100,880]);render();
  }
  if(d.type==='video_call_response'){
    if(S.role==='family' || S.role==='patient') {
      S.videoCallState = d.allowed ? 'allowed' : 'rejected';
      if(d.allowed && d.roomUrl){
        S.videoCallUrl = d.roomUrl;
      }
      render();
    }
  }
};
function handlePing(from){
  if(from==='patient'&&(S.role==='family'||S.role==='nurse')){S.patientConnected=true;CH.postMessage({type:'pong',from:S.role});render();}
  if(from==='family'&&(S.role==='patient'||S.role==='nurse')){S.familyConnected=true;CH.postMessage({type:'pong',from:S.role});render();}
  if(from==='nurse'&&(S.role==='patient'||S.role==='family')){S.nurseConnected=true;CH.postMessage({type:'pong',from:S.role});render();}
}
function handlePong(from){
  if(from==='patient')S.patientConnected=true;
  if(from==='family')S.familyConnected=true;
  if(from==='nurse')S.nurseConnected=true;

function playTone(freqs){
  try{const ctx=new AudioContext();freqs.forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;const t=ctx.currentTime+i*0.18;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.25,t+0.04);g.gain.linearRampToValueAtTime(0,t+0.2);o.start(t);o.stop(t+0.2);});}catch(e){}
}

function loadMediaPipe(){
  return new Promise((res,rej)=>{
    if(typeof FaceMesh!=='undefined'){res();return;}
    S.mpStatus='loading';updateMpChip();
    const s1=document.createElement('script');s1.src='https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js';s1.crossOrigin='anonymous';
    s1.onload=()=>{
      const s2=document.createElement('script');s2.src='https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js';s2.crossOrigin='anonymous';
      s2.onload=()=>{if(typeof FaceMesh!=='undefined'){S.mpStatus='ready';updateMpChip();res();}else{S.mpStatus='error';updateMpChip();rej(new Error('FaceMesh undefined'));}};
      s2.onerror=()=>{S.mpStatus='error';updateMpChip();rej(new Error('face_mesh.js failed'));};
      document.head.appendChild(s2);
    };
    s1.onerror=()=>{S.mpStatus='error';updateMpChip();rej(new Error('camera_utils.js failed'));};
    document.head.appendChild(s1);
  });
}
function updateMpChip(){
  const el=document.getElementById('mp-chip');if(!el)return;
  const labels={idle:'MP: idle',loading:'MP: loading…',ready:'MP: ready',error:'MP: error'};
  const cls={idle:'mp-idle',loading:'mp-loading',ready:'mp-ready',error:'mp-error'};
  el.textContent=labels[S.mpStatus];el.className='mp-chip '+(cls[S.mpStatus]||'mp-idle');
}

function drawEye(ctx,lm,idx,W,H,color){
  ctx.beginPath();idx.forEach((i,j)=>{const p=lm[i];j===0?ctx.moveTo(p.x*W,p.y*H):ctx.lineTo(p.x*W,p.y*H);});
  ctx.closePath();ctx.strokeStyle=color;ctx.lineWidth=1.6;ctx.stroke();ctx.fillStyle=color.replace('0.9','0.12');ctx.fill();
}
function eyeColor(){
  return S.sleepState==='awake'?'rgba(76,201,138,0.9)':S.sleepState==='asleep'?'rgba(68,114,196,0.9)':S.sleepState==='blinking'?'rgba(240,165,0,0.9)':'rgba(168,156,196,0.8)';
}
let frameThrottle=0;
function sendFrame(canvas){
  const t=now();if(t-frameThrottle<230)return;frameThrottle=t;
  try{CH.postMessage({type:'frame',data:canvas.toDataURL('image/jpeg',0.42)});}catch(e){}
}
function drawFeedFrame(id){
  if(!S.lastFrame)return;const c=document.getElementById(id);if(!c)return;
  const img=new Image();img.onload=()=>{c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);};img.src=S.lastFrame;
}

async function startCamera(){
  S.isMonitoring=true;S.sessionStart=now();S.earHistory=[];S.motionHistory=[];
  S.prevLandmarks=null;S.lidOpen=true;S.lidStart=null;S.frameCount=0;
  S.segments=[];S.currentSeg=null;S.totalSleepMs=0;S.totalAwakeMs=0;S.blinkCount=0;
  S.sleepState='unknown';S.sleepStateStart=now();
  render();
  try{await loadMediaPipe();}
  catch(err){addEvent('error','MediaPipe: '+err.message);S.isMonitoring=false;render();return;}
  try{
    S.faceMesh=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    S.faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
  }catch(err){addEvent('error','FaceMesh init: '+err.message);S.isMonitoring=false;render();return;}

  S.faceMesh.onResults(results=>{
    const vid=document.getElementById('pVid'),canvas=document.getElementById('pCanvas');
    if(!canvas||!vid)return;
    const ctx=canvas.getContext('2d');
    /* results.image is the exact frame MediaPipe processed — always has correct dimensions */
    const src=results.image||vid;
    const W=src.width||src.videoWidth||640;
    const H=src.height||src.videoHeight||480;
    if(canvas.width!==W)canvas.width=W;
    if(canvas.height!==H)canvas.height=H;

    /* Draw mirrored video frame first */
    ctx.save();
    ctx.translate(W,0);
    ctx.scale(-1,1);
    ctx.drawImage(src,0,0,W,H);
    ctx.restore();

    if(results.multiFaceLandmarks?.length){
      const lm=results.multiFaceLandmarks[0];
      /* landmarks come from the non-mirrored image, mirror them to match canvas */
      const mirroredLm=lm.map(p=>({x:1-p.x,y:p.y,z:p.z}));
      if(S.isMonitoring)processFrame(lm);
      const fd=document.getElementById('ps-face');if(fd){fd.textContent='face ✓';fd.style.color='#4cc98a';}
    } else {
      const fd=document.getElementById('ps-face');if(fd){fd.textContent='no face';fd.style.color='#a89cc4';}
      if(S.isMonitoring){S.confidence=0;broadcastState();updatePatientLive();}
    }
    sendFrame(canvas);
  });

  const vid=document.getElementById('pVid');if(!vid){S.isMonitoring=false;render();return;}
  try{
    S.mpCamera=new Camera(vid,{onFrame:async()=>{if(vid.readyState>=2&&S.isMonitoring){try{await S.faceMesh.send({image:vid});}catch(e){}}},width:640,height:480});
    await S.mpCamera.start();
    addEvent('info','Monitoring started');render();
  }catch(err){S.isMonitoring=false;addEvent('error','Camera: '+err.message);render();}
}

function stopCamera(){
  S.isMonitoring=false;
  if(S.currentSeg){S.currentSeg.end=now();S.currentSeg.dur=now()-S.currentSeg.start;S.segments.push({...S.currentSeg});S.currentSeg=null;}
  if(S.mpCamera){try{S.mpCamera.stop();}catch(e){}S.mpCamera=null;}
  if(S.faceMesh){try{S.faceMesh.close();}catch(e){}S.faceMesh=null;}
  const vid=document.getElementById('pVid');if(vid?.srcObject){vid.srcObject.getTracks().forEach(t=>t.stop());vid.srcObject=null;}
  addEvent('info','Monitoring stopped');broadcastState();render();
}

function timelineHTML(segs,totMs){
  const colMap={awake:'var(--green)',asleep:'var(--sleep)',blinking:'var(--blink)',unknown:'rgba(168,156,196,0.3)'};
  const bars=segs.map(seg=>{
    const pct=Math.max(0.2,Math.min(100,((seg.dur||0)/totMs)*100));
    const col=colMap[seg.state]||'rgba(168,156,196,0.3)';
    const label=seg.state==='asleep'?fmtDurMin(seg.dur||0):'';
    return `<div class="tl-segment tl-seg-${seg.state}" style="width:${pct}%;background:${col};" title="${seg.state} · ${fmtDur(seg.dur||0)}">${label?`<span style="font-size:8px;color:white;opacity:0.8;padding:0 3px;line-height:28px;white-space:nowrap;overflow:hidden;">${label}</span>`:''}</div>`;
  }).join('');
  const midLabel=fmtDur(totMs/2);
  return `
  <div class="timeline-track">${bars||'<div style="width:100%;background:rgba(168,156,196,0.15);"></div>'}</div>
  <div style="display:flex;justify-content:space-between;font-size:9.5px;color:var(--ink4);font-family:'DM Mono',monospace;margin-bottom:8px;">

    <div class="tl-leg-item"><div class="tl-leg-dot" style="background:var(--sleep);"></div>Asleep</div>
    <div class="tl-leg-item"><div class="tl-leg-dot" style="background:var(--blink);"></div>Blinking/droopy</div>

}

function evHTML(evs){

              <div id="ps-face-time" style="font-size:11px;color:var(--ink4);margin-top:3px">${S.isMonitoring?fmtDur(now()-S.sleepStateStart)+' in state':'Click start camera'}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-family:'DM Mono',monospace;font-size:22px;color:var(--ink3)" id="ps-ear-val">${S.lastEAR.toFixed(3)}</div>

            </div>
          </div>

            </div>
            <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--ink4);margin-top:3px;font-family:'DM Mono',monospace;">

          </div>

            <span>Movement</span><span id="ps-motion-val" style="font-family:'DM Mono',monospace;color:${mc}">${S.motionLevel}%</span>

            <div class="stat-card"><div class="stat-val" style="font-size:20px;color:var(--sleep)" id="ps-sleep-dur">${fmtDur(currentSleepMs())}</div><div class="stat-lbl">Sleep</div></div>
            <div class="stat-card"><div class="stat-val" style="font-size:20px;color:var(--green)" id="ps-awake-dur">${fmtDur(currentAwakeMs())}</div><div class="stat-lbl">Awake</div></div>
            <div class="stat-card"><div class="stat-val" style="font-size:20px;" id="ps-sleep-pct">${sleepPct()}%</div><div class="stat-lbl">Sleep%</div></div>
          </div>
          <div style="display:flex;justify-content:space-between;padding:8px 10px;background:rgba(155,107,240,0.06);border-radius:9px;">
            <div style="font-size:11px;color:var(--ink3);">Blinks detected</div>
            <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--ink)" id="ps-blinks">${S.blinkCount}</div>

          <div class="eyebrow">Events</div>
          <div class="ev-list" id="ps-evlist">${evHTML(S.events.slice(0,8))}</div>

        ${msgBox('Message family or nurse…')}

  </div>`;
}

function renderFamily(){
  const state=S.eyeState||'unknown';
  const isAwake=state==='awake',isAsleep=state==='asleep';
  const sp=S.remoteSleepPct||0;

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div><div style="font-family:'DM Serif Display',serif;font-size:26px;color:var(--ink)">Family view</div><div style="font-size:12px;color:var(--ink3);margin-top:2px">Watching ${S.patientName} · ${S.patientRoom}</div></div>
      <div style="display:flex;gap:6px;align-items:center;">${connChip(S.patientConnected,'Patient')}<button class="btn btn-ghost" style="padding:6px 12px;font-size:11px" onclick="S.role=null;render()">Switch</button></div>
    </div>
    ${isAwake?`<div class="alert-banner ab-green"><div style="display:flex;align-items:center;gap:10px;"><div style="width:34px;height:34px;border-radius:50%;background:var(--green-dim);border:1px solid var(--green-border);display:flex;align-items:center;justify-content:center;animation:breathe 1.5s infinite;"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="var(--green)" stroke-width="1.2"/><path d="M4 6.5l2 2 3.5-3.5" stroke="var(--green)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div><div style="font-family:'DM Serif Display',serif;font-size:17px;color:var(--ink)">${S.patientName} is awake</div><div style="font-size:12px;color:#1e7a4e;margin-top:1px">Eyes open detected</div></div></div>${S.videoCallState===null?`<button class="btn btn-green" onclick="S.videoCallState='pending';CH.postMessage({type:'video_call_request'});render()">📹 Request call</button>`:S.videoCallState==='pending'?`<div style="font-size:12px;color:#7a4a00;padding:6px 12px;background:var(--amber-dim);border:1px solid var(--amber-border);border-radius:9px;white-space:nowrap;">Waiting for nurse…</div>`:S.videoCallState==='allowed'?`<div style="font-size:12px;color:#1e7a4e;padding:6px 12px;background:var(--green-dim);border:1px solid var(--green-border);border-radius:9px;white-space:nowrap;">✓ Call approved</div>`:`<div style="font-size:12px;color:#7a1e1e;padding:6px 12px;background:var(--red-dim);border:1px solid var(--red-border);border-radius:9px;white-space:nowrap;">Call declined</div>`}</div>`:''}
    ${isAsleep?`<div class="alert-banner ab-blue"><div style="display:flex;align-items:center;gap:10px;"><div style="width:34px;height:34px;border-radius:50%;background:var(--blue-dim);border:1px solid var(--blue-border);display:flex;align-items:center;justify-content:center;"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="var(--blue)" stroke-width="1.2"/><path d="M4.5 8.5C5 7 8 7 8.5 5.5" stroke="var(--blue)" stroke-width="1.2" stroke-linecap="round"/></svg></div><div><div style="font-family:'DM Serif Display',serif;font-size:17px;color:var(--ink)">${S.patientName} is sleeping</div><div style="font-size:12px;color:#1e3e7a;margin-top:1px">Sleep confirmed — resting quietly</div></div></div></div>`:''}
    <div style="display:grid;grid-template-columns:1fr 250px;gap:14px;align-items:start;">
      <div style="display:flex;flex-direction:column;gap:12px;">
        ${S.videoCallUrl
          ? `<div style="position:relative; width:100%; height:400px; border-radius:18px; overflow:hidden; background:#0c0a16; border: 2px solid var(--purple);">
               <iframe allow="camera; microphone; fullscreen; display-capture; autoplay" src="${S.videoCallUrl}" style="height:100%; width:100%; border:0px;"></iframe>
               <button class="btn btn-red" style="position:absolute; bottom:10px; right:10px; z-index:10; background:var(--red); color:white; border:none; padding:8px 16px; border-radius:10px; cursor:pointer;" onclick="S.videoCallUrl=null; S.videoCallState=null; render()">End Call</button>
             </div>`
          : (S.lastFrame?`<div style="position:relative;"><canvas id="familyFeedCanvas" style="width:100%;border-radius:18px;display:block;min-height:240px;background:#0c0a16;"></canvas><div class="cam-overlay-lbl">LIVE · ${S.patientRoom.toUpperCase()}</div><div style="position:absolute;top:10px;right:12px;"><span class="state-badge ${{awake:'sb-awake',asleep:'sb-asleep',blinking:'sb-blink',unknown:'sb-unknown'}[state]||'sb-unknown'}">${{awake:'Awake',asleep:'Asleep',blinking:'Blinking',unknown:'—'}[state]||'—'}</span></div></div>`
        :`<div class="camwrap" style="min-height:240px;border-radius:18px;"><div style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px;"><div style="font-size:12px;color:rgba(180,170,222,0.4)">Waiting for patient feed</div></div></div>`)
        }
        <div class="timeline-wrap"><div class="eyebrow">Sleep / wake timeline</div><div>${remoteTimelineHTML()}</div></div>
        ${msgBox('Send a message…')}
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="gc" style="padding:14px 16px;">
          <div class="sleep-grid" style="grid-template-columns:1fr 1fr;">

            <div class="stat-card"><div class="stat-val" style="font-size:18px;padding-top:3px">${sp}%</div><div class="stat-lbl">Sleep%</div></div>
          </div>
          <div style="display:flex;align-items:center;gap:7px;padding:8px 10px;background:rgba(155,107,240,0.06);border-radius:9px;margin-top:0;margin-bottom:12px;">
            <div style="width:6px;height:6px;border-radius:50%;background:${isAwake?'var(--green)':isAsleep?'var(--sleep)':'var(--ink4)'}"></div>
            <div style="font-size:12px;color:var(--ink)">${isAwake?'Awake and alert':isAsleep?'Sleeping peacefully':state==='blinking'?'Drowsy / blinking':'Waiting for signal'}</div>
          </div>
          <div class="eyebrow">Notifications</div>
          <div style="display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;">
            ${S.notifications.length===0?'<div style="font-size:11px;color:var(--ink4);font-style:italic">No alerts yet.</div>'
            :S.notifications.slice(0,8).map(n=>{
              const isS=n.type==='sleep';const col=isS?'var(--sleep)':'var(--green)';
              return `<div class="gc notif-card"><div class="notif-icon" style="background:${col}22;border:1px solid ${col}55;"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><circle cx="5.5" cy="5.5" r="4.5" stroke="${col}" stroke-width="1.1"/>${isS?'<path d="M3.5 7C4 5.5 7 5.5 7.5 4" stroke="'+col+'" stroke-width="1.1" stroke-linecap="round"/>':`<path d="M3.5 5.5l1.5 1.5 2.5-2.5" stroke="${col}" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>`}</svg></div><div><div style="font-size:12px;color:var(--ink);font-weight:500">${n.title}</div><div style="font-size:11px;color:var(--ink3)">${n.sub}</div><div style="font-size:10px;color:var(--ink4);margin-top:1px">${n.ts}</div></div></div>`;}).join('')}
          </div>
        </div>
        <div class="gc" style="padding:14px 16px;"><div class="eyebrow">Recent events</div><div class="ev-list">${evHTML((S.events||[]).slice(0,5))}</div></div>
      </div>
    </div>
  </div>`;
}

function renderNurse(){
  const state=S.eyeState||'unknown';
  const isAwake=state==='awake'&&!S.nurseBannerDismissed,isAsleepBanner=state==='asleep';
  const isAsleep=state==='asleep';
  const hiM=S.motionLevel>MOTION_HIGH && Date.now() > S.nurseMotionCooldown;
  const medM=S.motionLevel>MOTION_ALERT;
  const unacked=(S.nurseNotifications||[]).filter(n=>!n.acked);
  const mc=hiM?'#f06060':medM?'#f0a500':'#4cc98a';
  const sp=S.remoteSleepPct||0;
  const slpMs=S.remoteSleepMs||0;
  return `<div style="padding:20px 24px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div><div style="font-family:'DM Serif Display',serif;font-size:26px;color:var(--ink)">Nurse station</div><div style="font-size:12px;color:var(--ink3);margin-top:2px">${unacked.length?`<span style="color:#7a4a00;font-weight:500">${unacked.length} unacknowledged</span>`:'All clear'}</div></div>
      <div style="display:flex;gap:6px;align-items:center;">${connChip(S.patientConnected,'Patient')}<button class="btn btn-ghost" style="padding:6px 12px;font-size:11px" onclick="S.role=null;render()">Switch</button></div>
    </div>
    ${isAwake?`<div class="alert-banner ab-green"><div style="display:flex;align-items:center;gap:10px;"><div style="width:34px;height:34px;border-radius:50%;background:var(--green-dim);border:1px solid var(--green-border);display:flex;align-items:center;justify-content:center;animation:breathe 1.5s infinite;"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="var(--green)" stroke-width="1.1"/><path d="M4 6.5l2 2 3.5-3.5" stroke="var(--green)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div><div style="font-family:'DM Serif Display',serif;font-size:16px;color:var(--ink)">${S.patientName} — awake</div><div style="font-size:11px;color:#1e7a4e;">Patient may need attention</div></div></div><button class="btn btn-green" onclick="S.nurseBannerDismissed=true;S.nurseNotifications.filter(n=>n.type==='eye').forEach(n=>n.acked=true);render()">Acknowledge</button></div>`:''}
    ${hiM?`<div class="alert-banner ab-amber"><div style="display:flex;align-items:center;gap:10px;"><div style="width:34px;height:34px;border-radius:50%;background:var(--amber-dim);border:1px solid var(--amber-border);display:flex;align-items:center;justify-content:center;animation:breathe 1.4s infinite;"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1.5L12 11H1L6.5 1.5z" stroke="var(--amber)" stroke-width="1.1" stroke-linejoin="round"/><path d="M6.5 5.5v2.5M6.5 9.5v.5" stroke="var(--amber)" stroke-width="1.2" stroke-linecap="round"/></svg></div><div><div style="font-family:'DM Serif Display',serif;font-size:16px;color:var(--ink)">${S.patientName} — high movement (${S.motionLevel}%)</div><div style="font-size:11px;color:#7a4a00;">May be in distress</div></div></div><button class="btn btn-amber" onclick="S.nurseMotionCooldown=Date.now()+30000;render()">Acknowledge</button></div>`:''}

    <div style="display:grid;grid-template-columns:1fr 260px;gap:14px;align-items:start;">
      <div style="display:flex;flex-direction:column;gap:12px;">
        ${S.videoCallUrl
          ? `<div style="position:relative; width:100%; height:400px; border-radius:18px; overflow:hidden; background:#0c0a16; border: 2px solid var(--purple);">
               <iframe allow="camera; microphone; fullscreen; display-capture; autoplay" src="${S.videoCallUrl}" style="height:100%; width:100%; border:0px;"></iframe>
               <button class="btn btn-red" style="position:absolute; bottom:10px; right:10px; z-index:10; background:var(--red); color:white; border:none; padding:8px 16px; border-radius:10px; cursor:pointer;" onclick="S.videoCallUrl=null; S.videoCallState=null; render()">End Call</button>
             </div>`
          : (S.lastFrame?`<div style="position:relative;"><canvas id="nurseFeedCanvas" style="width:100%;border-radius:18px;display:block;min-height:230px;background:#0c0a16;"></canvas><div class="cam-overlay-lbl">LIVE · ${S.patientRoom.toUpperCase()}</div><div style="position:absolute;top:10px;right:12px;"><span class="state-badge ${{awake:'sb-awake',asleep:'sb-asleep',blinking:'sb-blink',unknown:'sb-unknown'}[state]||'sb-unknown'}">${{awake:'Awake',asleep:'Asleep',blinking:'Blinking',unknown:'—'}[state]||'—'}</span></div></div>`
        :`<div class="camwrap" style="min-height:230px;border-radius:18px;"><div style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px;"><div style="font-size:12px;color:rgba(180,170,222,0.4)">Waiting for patient feed</div></div></div>`)
        }
        <div class="gc" style="padding:14px 16px;">
          <div class="eyebrow">Live status</div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;">
            <div class="stat-card"><div class="stat-val" style="font-size:17px;padding-top:3px;color:${isAwake?'var(--green)':isAsleep?'var(--sleep)':'var(--ink3)'}">${{awake:'Open',asleep:'Asleep',blinking:'Drowsy',unknown:'—'}[state]||'—'}</div><div class="stat-lbl">Eyes</div></div>
            <div class="stat-card"><div class="stat-val" style="font-size:17px;padding-top:3px;color:${mc}">${S.motionLevel}%</div><div class="stat-lbl">Motion</div></div>
            <div class="stat-card"><div class="stat-val" style="font-size:17px;padding-top:3px;color:var(--sleep)">${fmtDur(slpMs)}</div><div class="stat-lbl">Sleep</div></div>
            <div class="stat-card"><div class="stat-val" style="font-size:17px;padding-top:3px;color:var(--green)">${sp}%</div><div class="stat-lbl">Sleep%</div></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink3);margin-bottom:4px;"><span>Movement</span><span style="font-family:'DM Mono',monospace;color:${mc}">${S.motionLevel}%</span></div>
          <div style="height:5px;background:rgba(155,107,240,0.1);border-radius:99px;overflow:hidden;">
            <div style="height:100%;border-radius:99px;width:${S.motionLevel}%;background:${mc};transition:width 0.3s;"></div>
          </div>
        </div>
        <div class="timeline-wrap"><div class="eyebrow">Sleep / wake timeline</div><div>${remoteTimelineHTML()}</div></div>
        ${msgBox('Message patient or family…')}
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="gc" style="padding:14px 16px;">
          <div class="eyebrow">Alert log</div>
          <div style="max-height:300px;overflow-y:auto;">
            ${(()=>{const visible=S.nurseNotifications.filter(n=>!n.acked);if(!visible.length)return '<div style="font-size:11px;color:var(--ink4);font-style:italic;padding:8px 0">No active alerts.</div>';return visible.slice(0,14).map(n=>{const isVC=n.type==='videocall';const col=isVC?'var(--purple)':n.type==='eye'?'var(--green)':n.type==='sleep'?'var(--sleep)':n.priority==='high'?'var(--red)':'var(--amber)';const priCls={high:'pri-high',medium:'pri-med',low:'pri-low'}[n.priority]||'pri-info';const idx=S.nurseNotifications.indexOf(n);return `<div class="gc notif-card"><div class="notif-icon" style="background:${col}22;border:1px solid ${col}55;"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" stroke="${col}" stroke-width="1.1"/></svg></div><div style="flex:1;"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:2px;"><div style="font-size:12px;color:var(--ink);font-weight:500">${n.title}</div><span class="pri-badge ${priCls}">${n.priority}</span></div><div style="font-size:11px;color:var(--ink3)">${n.sub}</div><div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;">${isVC?`<div style="display:flex;gap:6px;"><button onclick="S.nurseNotifications[${idx}].acked=true; const roomName = 'VigilDemo_' + Math.floor(Math.random() * 100000); const jitsiUrl = 'https://meet.jit.si/' + roomName; S.videoCallUrl = jitsiUrl; CH.postMessage({type:'video_call_response', allowed:true, roomUrl: jitsiUrl}); render();" style="font-size:11px;padding:4px 12px;border:none;border-radius:7px;background:linear-gradient(135deg,#4cc98a,#2ea866);color:white;cursor:pointer;font-family:'Outfit',sans-serif;">Allow</button><button onclick="S.nurseNotifications[${idx}].acked=true;CH.postMessage({type:'video_call_response',allowed:false});render()" style="font-size:11px;padding:4px 12px;border:1px solid var(--red-border);border-radius:7px;background:var(--red-dim);color:#7a1e1e;cursor:pointer;font-family:'Outfit',sans-serif;">Reject</button></div>`:`<div style="font-size:10px;color:var(--ink4)">${n.ts}</div><button onclick="S.nurseNotifications[${idx}].acked=true;render()" style="font-size:10px;padding:2px 8px;border:1px solid rgba(155,107,240,0.25);border-radius:6px;background:none;color:var(--ink3);cursor:pointer;">Dismiss</button>`}</div></div></div>`;}).join('');})()}
          </div>
        </div>
        <div class="gc" style="padding:14px 16px;"><div class="eyebrow">Event log</div><div class="ev-list">${evHTML((S.events||[]).slice(0,7))}</div></div>
      </div>
    </div>
  </div>`;
}

function setRole(r){S.role=r;CH.postMessage({type:'ping',from:r});render();}

function render(){
  const app=document.getElementById('app');if(!app)return;
  const rpCls={patient:'rp-patient',family:'rp-family',nurse:'rp-nurse'}[S.role]||'rp-patient';
  const rpLbl={patient:'Patient room',family:'Family view',nurse:'Nurse station'}[S.role]||'';
  const stateSnippet=S.role==='patient'&&S.isMonitoring
    ?`<div class="pulse-dot pd-green"></div><span>${{awake:'Awake',asleep:'Asleep',blinking:'Blinking',unknown:'Detecting'}[S.sleepState]||'Live'}</span>`
    :S.role==='nurse'&&(S.nurseNotifications||[]).filter(n=>!n.acked).length
    ?`<div class="pulse-dot pd-amber"></div><span>${(S.nurseNotifications||[]).filter(n=>!n.acked).length} unacked</span>`
    :S.role==='family'&&S.eyeState==='awake'?`<div class="pulse-dot pd-green"></div><span>Awake</span>`:S.role==='family'&&S.eyeState==='asleep'?`<div class="pulse-dot pd-blue"></div><span>Sleeping</span>`:'';
  const nav=S.role?`<nav class="topbar"><div class="logo" onclick="S.role=null;render()"><div class="logo-mark"></div><span class="logo-text">Vigil</span></div><div class="role-pill ${rpCls}">${rpLbl}</div><div class="tb-right">${stateSnippet}</div></nav>`:'';
  let body='';
  if(!S.role)body=renderRoleSelect();
  else if(S.role==='patient')body=renderPatient();
  else if(S.role==='family')body=renderFamily();
  else body=renderNurse();
  app.innerHTML=nav+body;
  if(S.role==='family'&&S.lastFrame)setTimeout(()=>drawFeedFrame('familyFeedCanvas'),50);
  if(S.role==='nurse'&&S.lastFrame)setTimeout(()=>drawFeedFrame('nurseFeedCanvas'),50);
  if((S.role==='family'||S.role==='nurse'))setTimeout(()=>{const ml=document.getElementById('msg-list');if(ml)ml.scrollTop=ml.scrollHeight;},60);
  updateMpChip();
}

render();
setInterval(()=>{if(S.role)CH.postMessage({type:'ping',from:S.role});},4000);
setInterval(()=>{if(S.role==='patient'&&S.isMonitoring)updatePatientLive();},1000);

/* ── URL Parameter Auto-Role Selection ── */
const urlParams = new URLSearchParams(window.location.search);
const roleParam = urlParams.get('role');
if (roleParam && ['patient', 'family', 'nurse'].includes(roleParam) && !S.role) {
  setRole(roleParam);
}
</script>
</body>
</html>
