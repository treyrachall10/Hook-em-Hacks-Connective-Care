<div class="app" id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script>
const CH = new BroadcastChannel('vigil_v3');
const LEFT_EYE=[362,385,387,263,373,380];
const RIGHT_EYE=[33,160,158,133,153,144];
const EAR_THRESH=0.22;
const MOTION_ALERT_THRESH=35;
const MOTION_HIGH_THRESH=60;

const S={
  role:null,
  patientName:'George P.',
  patientRoom:'Room 1',
  patientWard:'ICU',
  isMonitoring:false,
  eyeState:'unknown',
  confidence:0,
  lastEAR:0,
  earHistory:[],
  motionLevel:0,
  motionHistory:[],
  prevLandmarks:null,
  events:[],
  timeline:[],
  alertsToday:0,
  motionAlertsToday:0,
  sessionStart:null,
  eyeOpen:null,
  openStart:null,
  lastToggle:null,
  faceMesh:null,
  mpCamera:null,
  familyAlerted:false,
  nurseEyeAlerted:false,
  nurseMotionAlerted:false,
  notifications:[],
  nurseNotifications:[],
  messages:[],
  lastFrame:null,
  patientConnected:false,
  familyConnected:false,
  nurseConnected:false,
  msgInput:'',
  nurseAcknowledged:false,
  motionAlertCooldown:0,
};

function tsShort(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);}
function ear(lm,idx){const[p1,p2,p3,p4,p5,p6]=idx.map(i=>lm[i]);return(dist(p2,p6)+dist(p3,p5))/(2*dist(p1,p4));}

function calcMotion(cur,prev){
  if(!prev||!cur)return 0;
  let total=0;
  const sample=[1,4,10,33,61,93,133,152,168,234,263,291,323,356,389,397,454];
  sample.forEach(i=>{if(cur[i]&&prev[i])total+=dist(cur[i],prev[i]);});
  return Math.min(100,Math.round(total*6000));
}

CH.onmessage=e=>{
  const d=e.data;
  if(d.type==='ping')handlePing(d.from);
  if(d.type==='pong')handlePong(d.from);
  if(d.type==='state_update'){
    if(S.role==='family'||S.role==='nurse'){
      S.eyeState=d.eyeState;S.confidence=d.confidence;S.lastEAR=d.lastEAR;
      S.alertsToday=d.alertsToday;S.motionAlertsToday=d.motionAlertsToday;
      S.events=d.events;S.timeline=d.timeline;S.motionLevel=d.motionLevel;
      if(S.role==='family'){
        if(d.eyeState==='eyes_open'&&!S.familyAlerted){
          S.familyAlerted=true;
          S.notifications.unshift({id:Date.now(),title:S.patientName+' is awake',sub:'Eyes open · '+tsShort(),color:'#6ec8a4',ts:tsShort()});
          playTone([880,880,880]);
        }
        if(d.eyeState==='eyes_closed')S.familyAlerted=false;
      }
      if(S.role==='nurse'){
        if(d.eyeState==='eyes_open'&&!S.nurseEyeAlerted){
          S.nurseEyeAlerted=true;S.nurseAcknowledged=false;
          S.nurseNotifications.unshift({id:Date.now(),type:'eye',title:'Eyes open — '+S.patientName,sub:'Room '+S.patientRoom+' · '+tsShort(),priority:'medium',ts:tsShort()});
          playTone([660,880]);
        }
        if(d.eyeState==='eyes_closed'){S.nurseEyeAlerted=false;}
        const now=Date.now();
        if(d.motionLevel>MOTION_ALERT_THRESH&&(now-S.motionAlertCooldown)>15000){
          S.motionAlertCooldown=now;
          const hi=d.motionLevel>MOTION_HIGH_THRESH;
          S.nurseNotifications.unshift({id:now,type:'motion',title:(hi?'High':'Elevated')+' movement — '+S.patientName,sub:'Motion level '+d.motionLevel+'% · Room '+S.patientRoom+' · '+tsShort(),priority:hi?'high':'medium',ts:tsShort()});
          playTone(hi?[440,550,660]:[550,660]);
          S.motionAlertsToday++;
        }
      }
      render();
    }
  }
  if(d.type==='frame'&&(S.role==='family'||S.role==='nurse')){
    S.lastFrame=d.data;drawFeedFrame(d.role==='nurse'?'nurseFeedCanvas':'familyFeedCanvas');
    if(S.role==='nurse')drawFeedFrame('nurseFeedCanvas');
    if(S.role==='family')drawFeedFrame('familyFeedCanvas');
  }
  if(d.type==='chat'){
    const isMine=(d.from===S.role);
    const label={patient:'Patient',family:'Family',nurse:'Nurse'}[d.from]||d.from;
    S.messages.push({from:isMine?'me':d.from,label,text:d.text,time:d.time});
    render();
    setTimeout(()=>{const ml=document.getElementById('msg-list');if(ml)ml.scrollTop=ml.scrollHeight;},50);
  }
};

function handlePing(from){
  if(from==='patient'){if(S.role==='family'||S.role==='nurse'){S.patientConnected=true;CH.postMessage({type:'pong',from:S.role});render();}}
  if(from==='family'){if(S.role==='patient'||S.role==='nurse'){S.familyConnected=true;CH.postMessage({type:'pong',from:S.role});render();}}
  if(from==='nurse'){if(S.role==='patient'||S.role==='family'){S.nurseConnected=true;CH.postMessage({type:'pong',from:S.role});render();}}
}
function handlePong(from){
  if(from==='patient')S.patientConnected=true;
  if(from==='family')S.familyConnected=true;
  if(from==='nurse')S.nurseConnected=true;
  render();
}

function playTone(freqs){
  try{
    const ctx=new AudioContext();
    freqs.forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.frequency.value=f;
      const t=ctx.currentTime+i*0.18;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.28,t+0.04);g.gain.linearRampToValueAtTime(0,t+0.22);
      o.start(t);o.stop(t+0.22);
    });
  }catch(e){}
}

function broadcastState(){
  CH.postMessage({type:'state_update',eyeState:S.eyeState,confidence:S.confidence,lastEAR:S.lastEAR,alertsToday:S.alertsToday,motionAlertsToday:S.motionAlertsToday,events:S.events.slice(0,20),timeline:S.timeline.slice(0,30),motionLevel:S.motionLevel});
}

function addEvent(type,text){
  const ev={type,text,time:tsShort(),ts:Date.now()};
  S.events.unshift(ev);if(S.events.length>60)S.events.pop();
  S.timeline.unshift(ev);if(S.timeline.length>80)S.timeline.pop();
  broadcastState();
}

function processFrame(lm){
  S.earHistory=S.earHistory||[];
  const avgEar=(ear(lm,LEFT_EYE)+ear(lm,RIGHT_EYE))/2;
  S.earHistory.push(avgEar);if(S.earHistory.length>5)S.earHistory.shift();
  const sm=S.earHistory.reduce((a,b)=>a+b,0)/S.earHistory.length;
  S.confidence=Math.min(99,Math.round(Math.abs(sm-EAR_THRESH)*280+52));
  S.lastEAR=+sm.toFixed(3);
  const open=sm>EAR_THRESH;
  if(S.eyeOpen===null){S.eyeOpen=open;S.eyeState=open?'eyes_open':'eyes_closed';S.lastToggle=Date.now();S.openStart=open?Date.now():null;addEvent(open?'open':'closed',open?'Eyes open detected':'Eyes closed — resting');}
  else if(open!==S.eyeOpen){
    const now=Date.now(),dur=Math.round((now-S.lastToggle)/1000);
    if(dur>=1){
      S.eyeOpen=open;S.eyeState=open?'eyes_open':'eyes_closed';S.lastToggle=now;
      if(open){S.openStart=now;S.alertsToday++;addEvent('open','Eyes open detected');}
      else{const os=S.openStart?Math.round((now-S.openStart)/1000):dur;S.openStart=null;addEvent('closed','Eyes closed — open for '+os+'s');}
    }
  }
  const motion=calcMotion(lm,S.prevLandmarks);
  S.prevLandmarks=lm;
  S.motionHistory=S.motionHistory||[];
  S.motionHistory.push(motion);if(S.motionHistory.length>8)S.motionHistory.shift();
  S.motionLevel=Math.round(S.motionHistory.reduce((a,b)=>a+b,0)/S.motionHistory.length);
  if(S.motionLevel>MOTION_ALERT_THRESH){
    const now=Date.now();
    if(now-(S.lastMotionEvent||0)>8000){
      S.lastMotionEvent=now;
      addEvent('motion',(S.motionLevel>MOTION_HIGH_THRESH?'High':'Elevated')+' movement detected ('+S.motionLevel+'%)');
    }
  }
  broadcastState();
  updatePatientLive();
}

function updatePatientLive(){
  const ids={title:'ps-title',sub:'ps-sub',conf:'ps-conf',fill:'ps-fill',ear:'ps-ear',mfill:'ps-mfill',mlevel:'ps-mlevel',evlist:'ps-evlist'};
  const el=id=>document.getElementById(id);
  if(el(ids.title))el(ids.title).textContent=S.eyeState==='eyes_open'?'Eyes open':S.eyeState==='eyes_closed'?'Eyes closed':'Detecting…';
  if(el(ids.sub))el(ids.sub).textContent=S.eyeState==='eyes_open'?'Live · stable':S.eyeState==='eyes_closed'?'Resting':'Awaiting face';
  if(el(ids.conf))el(ids.conf).textContent=S.confidence+'%';
  if(el(ids.fill))el(ids.fill).style.width=S.confidence+'%';
  if(el(ids.ear))el(ids.ear).textContent='EAR '+S.lastEAR.toFixed(3);
  const mc=S.motionLevel>MOTION_HIGH_THRESH?'#f4867e':S.motionLevel>MOTION_ALERT_THRESH?'#EF9F27':'#6ec8a4';
  if(el(ids.mfill)){el(ids.mfill).style.width=S.motionLevel+'%';el(ids.mfill).style.background=mc;}
  if(el(ids.mlevel))el(ids.mlevel).textContent=S.motionLevel+'%';
  if(el(ids.evlist))el(ids.evlist).innerHTML=evHTML(S.events.slice(0,6));
}

function drawEye(ctx,lm,idx,W,H){
  ctx.beginPath();idx.forEach((i,j)=>{const p=lm[i];j===0?ctx.moveTo(p.x*W,p.y*H):ctx.lineTo(p.x*W,p.y*H);});
  ctx.closePath();ctx.strokeStyle='rgba(180,170,222,0.9)';ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle='rgba(180,170,222,0.1)';ctx.fill();
}

function drawFeedFrame(canvasId){
  if(!S.lastFrame)return;
  const c=document.getElementById(canvasId);if(!c)return;
  const img=new Image();img.onload=()=>{c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);};img.src=S.lastFrame;
}

let frameThrottle=0;
function sendFrame(vid,overlay){
  const now=Date.now();if(now-frameThrottle<220)return;frameThrottle=now;
  try{
    const off=document.createElement('canvas');off.width=vid.videoWidth||320;off.height=vid.videoHeight||240;
    const ctx=off.getContext('2d');ctx.save();ctx.scale(-1,1);ctx.drawImage(vid,-off.width,0,off.width,off.height);ctx.restore();
    ctx.drawImage(overlay,0,0,off.width,off.height);
    CH.postMessage({type:'frame',data:off.toDataURL('image/jpeg',0.45)});
  }catch(e){}
}

async function startCamera(){
  S.isMonitoring=true;S.sessionStart=Date.now();S.earHistory=[];S.motionHistory=[];S.prevLandmarks=null;render();
  if(!S.faceMesh){
    S.faceMesh=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    S.faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
  }
  S.faceMesh.onResults(results=>{
    const vid=document.getElementById('pVid'),canvas=document.getElementById('pCanvas');
    if(!canvas||!vid)return;
    const ctx=canvas.getContext('2d');canvas.width=vid.videoWidth||640;canvas.height=vid.videoHeight||480;ctx.clearRect(0,0,canvas.width,canvas.height);
    if(results.multiFaceLandmarks?.length){
      const lm=results.multiFaceLandmarks[0];
      drawEye(ctx,lm,LEFT_EYE,canvas.width,canvas.height);drawEye(ctx,lm,RIGHT_EYE,canvas.width,canvas.height);
      const mc=S.motionLevel>MOTION_HIGH_THRESH?'rgba(244,134,126,0.7)':S.motionLevel>MOTION_ALERT_THRESH?'rgba(239,159,39,0.6)':'rgba(110,200,164,0.5)';
      ctx.strokeStyle=mc;ctx.lineWidth=1;ctx.beginPath();ctx.arc(lm[1].x*canvas.width,lm[1].y*canvas.height,S.motionLevel*0.6,0,Math.PI*2);ctx.stroke();
      if(S.isMonitoring)processFrame(lm);
    } else{if(S.isMonitoring){S.confidence=0;broadcastState();updatePatientLive();}}
    sendFrame(vid,canvas);
  });
  const vid=document.getElementById('pVid');
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}});
    vid.srcObject=stream;await vid.play();
    S.mpCamera=new Camera(vid,{onFrame:async()=>{if(vid.readyState>=2)await S.faceMesh.send({image:vid});},width:640,height:480});
    S.mpCamera.start();
  }catch(err){S.isMonitoring=false;addEvent('error','Camera access denied');render();}
}

function stopCamera(){
  S.isMonitoring=false;S.eyeState='unknown';S.confidence=0;S.eyeOpen=null;S.motionLevel=0;
  if(S.mpCamera){try{S.mpCamera.stop();}catch(e){}S.mpCamera=null;}
  const vid=document.getElementById('pVid');
  if(vid?.srcObject){vid.srcObject.getTracks().forEach(t=>t.stop());vid.srcObject=null;}
  broadcastState();render();
}

function sendMsg(){
  const inp=document.getElementById('msg-input');if(!inp||!inp.value.trim())return;
  const text=inp.value.trim(),time=tsShort();inp.value='';
  S.messages.push({from:'me',label:{patient:'Patient',family:'Family',nurse:'Nurse'}[S.role],text,time});
  CH.postMessage({type:'chat',from:S.role,text,time});
  render();setTimeout(()=>{const ml=document.getElementById('msg-list');if(ml)ml.scrollTop=ml.scrollHeight;},50);
}

function evHTML(evs){
  if(!evs?.length)return '<div style="font-size:12px;color:#b3aade;font-style:italic">No events yet.</div>';

}

        <div class="gc" style="padding:14px 16px;">
          <div class="eyebrow">Live vitals</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;">
            <div class="stat-box"><div class="stat-val" style="font-size:20px;padding-top:2px;color:${isAwake?'#2d7a55':'#3c2f6e'}">${isAwake?'Open':'${S.eyeState==="eyes_closed"?"Closed":"—"}'}</div><div class="stat-lbl">Eyes</div></div>
            <div class="stat-box"><div class="stat-val" style="font-size:20px;padding-top:2px;color:${hiMotion?'#a33d35':medMotion?'#854F0B':'#3c2f6e'}">${S.motionLevel}%</div><div class="stat-lbl">Movement</div></div>
            <div class="stat-box"><div class="stat-val">${S.alertsToday+S.motionAlertsToday}</div><div class="stat-lbl">Total alerts</div></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:#7b6bbf;margin-bottom:3px"><span>Movement level</span><span style="color:${S.motionLevel>MOTION_HIGH_THRESH?'#f4867e':S.motionLevel>MOTION_ALERT_THRESH?'#EF9F27':'#6ec8a4'}">${S.motionLevel}%</span></div>
          <div class="motion-bar"><div style="height:100%;border-radius:99px;width:${S.motionLevel}%;background:${hiMotion?'#f4867e':medMotion?'#EF9F27':'#6ec8a4'};transition:width 0.3s,background 0.3s;"></div></div>
          <div style="display:flex;gap:6px;margin-top:6px;font-size:11px;color:#b3aade;"><span style="padding:1px 7px;background:rgba(110,200,164,0.1);border-radius:99px;color:#3d7a5c">Low &lt;${MOTION_ALERT_THRESH}%</span><span style="padding:1px 7px;background:rgba(239,159,39,0.1);border-radius:99px;color:#854F0B">Elevated ${MOTION_ALERT_THRESH}–${MOTION_HIGH_THRESH}%</span><span style="padding:1px 7px;background:rgba(244,134,126,0.1);border-radius:99px;color:#a33d35">High &gt;${MOTION_HIGH_THRESH}%</span></div>
        </div>

        <div class="gc" style="padding:14px 16px;">
          <div class="eyebrow">Messages</div>
          <div class="msg-list" id="msg-list">${msgListHTML()}</div>
          <div class="msg-ir">
            <input class="msg-inp" id="msg-input" placeholder="Message patient or family…" onkeydown="if(event.key==='Enter')sendMsg()"/>
            <button class="btn-p" style="padding:8px 12px" onclick="sendMsg()"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M10 1L4.5 6M10 1L7 10L4.5 6M10 1L1 4L4.5 6" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          </div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="gc" style="padding:14px 16px;">
          <div class="eyebrow">Alert log</div>
          <div style="display:flex;flex-direction:column;gap:0;max-height:280px;overflow-y:auto;">
            ${S.nurseNotifications.length===0?'<div style="font-size:11px;color:#b3aade;font-style:italic;padding:8px 0">No alerts yet. Alerts appear here when eyes open or movement is detected.</div>'
            :S.nurseNotifications.slice(0,12).map(n=>{
              const col=n.type==='eye'?'#6ec8a4':n.priority==='high'?'#f4867e':'#EF9F27';
              const pri=n.priority==='high'?'pb-high':n.priority==='medium'?'pb-med':'pb-low';
              return `<div class="gc notif-card" style="margin-bottom:7px;${n.acked?'opacity:0.55':''}">
                <div class="notif-icon" style="background:${col}22;border:1px solid ${col}55;">
                  <svg width="11" height="11" viewBox="0 0 11 11" fill="none">${n.type==='eye'?'<circle cx="5.5" cy="5.5" r="4.5" stroke="'+col+'" stroke-width="1.1"/><path d="M3.5 5.5l1.5 1.5 2.5-2.5" stroke="'+col+'" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>':`<path d="M5.5 1.5L10 9.5H1L5.5 1.5z" stroke="${col}" stroke-width="1" stroke-linejoin="round"/><path d="M5.5 5v2M5.5 8.5v.5" stroke="${col}" stroke-width="1.1" stroke-linecap="round"/>`}</svg>
                </div>
                <div style="flex:1;">
                  <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:2px;"><div class="notif-title">${n.title}</div><div class="priority-badge ${pri}">${n.priority}</div>${n.acked?'<div style="font-size:10px;color:#b3aade">acked</div>':''}</div>
                  <div class="notif-sub">${n.sub}</div>
                  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px;"><div class="notif-time">${n.ts}</div>${!n.acked?`<button onclick="S.nurseNotifications[${S.nurseNotifications.indexOf(n)}].acked=true;render()" style="font-size:10px;padding:2px 8px;border:1px solid rgba(124,107,191,0.3);border-radius:6px;background:none;color:#7b6bbf;cursor:pointer;">Ack</button>`:''}
                  </div>
                </div>
              </div>`;}).join('')}
          </div>
        </div>
        <div class="gc" style="padding:14px 16px;">
          <div class="eyebrow">Recent events</div>
          <div style="display:flex;flex-direction:column;gap:0;">
            ${S.timeline.slice(0,6).map((ev,i)=>`<div class="tl-entry"><div class="tl-spine"><div class="tl-dot" style="background:${ev.type==='open'?'#6ec8a4':ev.type==='motion'?'#EF9F27':'#b3aade'}"></div>${i<Math.min(6,S.timeline.length)-1?'<div class="tl-line"></div>':''}</div><div class="tl-body"><div class="tl-title">${ev.text}</div><div class="tl-time">${ev.time}</div></div></div>`).join('')||'<div style="font-size:11px;color:#b3aade;font-style:italic">No events yet.</div>'}
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function setRole(r){
  S.role=r;CH.postMessage({type:'ping',from:r});render();
}

function render(){
  const app=document.getElementById('app');if(!app)return;
  const rbClass=S.role==='patient'?'rb-patient':S.role==='nurse'?'rb-nurse':'rb-family';
  const rbLabel=S.role==='patient'?'Patient room':S.role==='family'?'Family view':'Nurse station';
  const nav=S.role?`<nav class="topbar"><div class="logo" onclick="S.role=null;render()"><div class="logo-dot"></div><span class="logo-text">Vigil</span></div><div class="rb ${rbClass}">${rbLabel}</div><div class="tb-right">${S.role==='patient'&&S.isMonitoring?`<div class="orb"></div><span>Live</span>`:S.role==='nurse'&&S.nurseNotifications.filter(n=>!n.acked).length?`<div class="orb-amber"></div><span>${S.nurseNotifications.filter(n=>!n.acked).length} unacked</span>`:S.role==='family'&&S.eyeState==='eyes_open'?`<div class="orb"></div><span>Awake</span>`:''}</div></nav>`:'';
  let body='';
  if(!S.role)body=renderRoleSelect();
  else if(S.role==='patient')body=renderPatient();
  else if(S.role==='family')body=renderFamily();
  else body=renderNurse();
  app.innerHTML=nav+body;
  if(S.role==='family'&&S.lastFrame)setTimeout(()=>drawFeedFrame('familyFeedCanvas'),50);
  if(S.role==='nurse'&&S.lastFrame)setTimeout(()=>drawFeedFrame('nurseFeedCanvas'),50);
  if(S.role==='family'||S.role==='nurse')setTimeout(()=>{const ml=document.getElementById('msg-list');if(ml)ml.scrollTop=ml.scrollHeight;},60);
}

render();
setInterval(()=>{if(S.role)CH.postMessage({type:'ping',from:S.role});},4000);
</script>
