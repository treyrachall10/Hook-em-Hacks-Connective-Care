<div class="app" id="app"></div>

<script>
const CH=new BroadcastChannel('vigil_v5');

const LEFT_EYE=[362,385,387,263,373,380];
const RIGHT_EYE=[33,160,158,133,153,144];
const EAR_OPEN=0.24;
const EAR_BLINK=0.15;
const BLINK_MAX_MS=350;
const SLEEP_CONFIRM_MS=2500;
const WAKE_CONFIRM_MS=600;
const MOTION_ALERT=35;
const MOTION_HIGH=60;

const S={
  role:null,
  patientName:'Patient 01',patientRoom:'Room 1',patientWard:'ICU',
  isMonitoring:false,mpStatus:'idle',
  eyeState:'unknown',confidence:0,lastEAR:0,earHistory:[],earSmooth:0,
  lidStart:null,lidOpen:true,blinkCount:0,
  sleepState:'unknown',sleepStateStart:Date.now(),
  segments:[],currentSeg:null,
  totalSleepMs:0,totalAwakeMs:0,
  alertsToday:0,motionAlertsToday:0,sessionStart:null,
  motionLevel:0,motionHistory:[],prevLandmarks:null,lastMotionEvent:0,
  events:[],
  /* messages: {from, role, text, time, isSystem} */
  messages:[],
  notifications:[],nurseNotifications:[],
  patientConnected:false,familyConnected:false,nurseConnected:false,
  familyAlerted:false,nurseAlerted:false,nurseMotionCooldown:0,
  faceMesh:null,mpCamera:null,lastFrame:null,frameCount:0,
  /* video call state */
  /* 'idle' | 'pending_nurse' | 'approved' | 'active' | 'denied' */
  callState:'idle',
  callRequestId:null,
  vcallTimer:0,
  vcallInterval:null,
  /* WebRTC */
  peerConn:null,
  localStream:null,
  remoteStream:null,
};

/* ── Helpers ── */
function now(){return Date.now();}
function tsShort(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);}
function ear(lm,idx){const[p1,p2,p3,p4,p5,p6]=idx.map(i=>lm[i]);return(dist(p2,p6)+dist(p3,p5))/(2*dist(p1,p4));}
function fmtDur(ms){const s=Math.round(ms/1000);if(s<60)return s+'s';const m=Math.floor(s/60),r=s%60;return m+'m '+(r>0?r+'s':'');}
function fmtDurMin(ms){return Math.round(ms/60000)+'m';}
function calcMotion(cur,prev){
  if(!prev||!cur)return 0;
  let t=0;[1,4,10,33,61,93,133,152,168,234,263,291,323,356,389,397,454].forEach(i=>{if(cur[i]&&prev[i])t+=dist(cur[i],prev[i]);});
  return Math.min(100,Math.round(t*6000));
}
function fmtCallTime(s){const m=Math.floor(s/60),r=s%60;return String(m).padStart(2,'0')+':'+String(r).padStart(2,'0');}

/* ── Sleep state machine ── */
function transitionSleepState(newState){
  if(S.sleepState===newState)return;
  const old=S.sleepState;
  const duration=now()-S.sleepStateStart;
  if(S.currentSeg){S.currentSeg.end=now();S.currentSeg.dur=duration;S.segments.push({...S.currentSeg});}
  if(old==='asleep')S.totalSleepMs+=duration;
  else if(old==='awake')S.totalAwakeMs+=duration;
  S.sleepState=newState;S.sleepStateStart=now();
  S.currentSeg={state:newState,start:now(),end:null,dur:0};
  const labels={awake:'Patient awake',asleep:'Sleep detected',blinking:'Blink detected',unknown:'Signal lost'};
  addEvent(newState,labels[newState]||newState);
  broadcastState();
}

function processFrame(lm){
  S.frameCount++;
  const raw=(ear(lm,LEFT_EYE)+ear(lm,RIGHT_EYE))/2;
  S.earHistory.push(raw);if(S.earHistory.length>6)S.earHistory.shift();
  const sm=S.earHistory.reduce((a,b)=>a+b,0)/S.earHistory.length;
  S.lastEAR=+sm.toFixed(3);S.earSmooth=sm;
  S.confidence=Math.min(99,Math.round(Math.abs(sm-((EAR_OPEN+EAR_BLINK)/2))*400+45));
  const lidOpen=sm>EAR_OPEN,lidClosed=sm<EAR_BLINK;
  const t=now();
  if(lidOpen){
    if(!S.lidOpen){const closedDur=t-S.lidStart;if(closedDur<=BLINK_MAX_MS){S.blinkCount++;if(S.sleepState!=='asleep')transitionSleepState('awake');else transitionSleepState('blinking');}}
    S.lidOpen=true;S.lidStart=null;
    if(S.sleepState==='asleep'){if(!S._wakeStart)S._wakeStart=t;else if(t-S._wakeStart>WAKE_CONFIRM_MS){transitionSleepState('awake');S._wakeStart=null;S.alertsToday++;}}
    else{S._wakeStart=null;if(S.sleepState==='unknown'||S.sleepState==='blinking')transitionSleepState('awake');}
  }else{
    S._wakeStart=null;
    if(S.lidOpen){S.lidOpen=false;S.lidStart=t;}
    if(S.lidStart&&(t-S.lidStart)>SLEEP_CONFIRM_MS){if(S.sleepState!=='asleep')transitionSleepState('asleep');}
    else if(S.lidStart&&(t-S.lidStart)>BLINK_MAX_MS&&(t-S.lidStart)<=SLEEP_CONFIRM_MS){if(S.sleepState==='awake'||S.sleepState==='unknown')transitionSleepState('blinking');}
  }
  const motion=calcMotion(lm,S.prevLandmarks);
  S.prevLandmarks=[...lm];
  S.motionHistory.push(motion);if(S.motionHistory.length>8)S.motionHistory.shift();
  S.motionLevel=Math.round(S.motionHistory.reduce((a,b)=>a+b,0)/S.motionHistory.length);
  if(S.motionLevel>MOTION_ALERT&&(t-S.lastMotionEvent)>8000){S.lastMotionEvent=t;addEvent('motion',(S.motionLevel>MOTION_HIGH?'High':'Elevated')+' movement ('+S.motionLevel+'%)');}
  broadcastState();updatePatientLive();
}

function getTimelineSegments(){const segs=[...S.segments];if(S.currentSeg){segs.push({...S.currentSeg,end:now(),dur:now()-S.currentSeg.start});}return segs;}
function totalSessionMs(){return S.sessionStart?now()-S.sessionStart:0;}
function currentSleepMs(){let t=S.totalSleepMs;if(S.sleepState==='asleep')t+=now()-S.sleepStateStart;return t;}
function currentAwakeMs(){let t=S.totalAwakeMs;if(S.sleepState==='awake')t+=now()-S.sleepStateStart;return t;}
function sleepPct(){const tot=totalSessionMs();return tot>0?Math.round(currentSleepMs()/tot*100):0;}

function broadcastState(){
  const segs=getTimelineSegments();
  CH.postMessage({type:'state_update',eyeState:S.sleepState,confidence:S.confidence,lastEAR:S.lastEAR,
    alertsToday:S.alertsToday,motionAlertsToday:S.motionAlertsToday,events:S.events.slice(0,30),
    motionLevel:S.motionLevel,segments:segs,totalSleepMs:currentSleepMs(),totalAwakeMs:currentAwakeMs(),
    sessionMs:totalSessionMs(),blinkCount:S.blinkCount,sleepPct:sleepPct()});
}

function addEvent(type,text){
  const ev={type,text,time:tsShort(),ts:now()};
  S.events.unshift(ev);if(S.events.length>80)S.events.pop();
  broadcastState();
}

/* ── WebRTC helpers ── */
const ICE={iceServers:[{urls:'stun:stun.l.google.com:19302'}]};

async function startCallAsPatient(){
  if(S.peerConn)return;
  S.peerConn=new RTCPeerConnection(ICE);
  S.localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true}).catch(()=>null);
  if(S.localStream)S.localStream.getTracks().forEach(t=>S.peerConn.addTrack(t,S.localStream));
  S.peerConn.ontrack=e=>{S.remoteStream=e.streams[0];showCallUI();};
  S.peerConn.onicecandidate=e=>{if(e.candidate)CH.postMessage({type:'vcall_ice',from:'patient',candidate:e.candidate});};
  const offer=await S.peerConn.createOffer();
  await S.peerConn.setLocalDescription(offer);
  CH.postMessage({type:'vcall_offer',from:'patient',sdp:offer});
  S.callState='active';startCallTimer();showCallUI();render();
}

async function startCallAsFamily(){
  if(S.peerConn)return;
  S.peerConn=new RTCPeerConnection(ICE);
  S.localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true}).catch(()=>null);
  if(S.localStream)S.localStream.getTracks().forEach(t=>S.peerConn.addTrack(t,S.localStream));
  S.peerConn.ontrack=e=>{S.remoteStream=e.streams[0];showCallUI();};
  S.peerConn.onicecandidate=e=>{if(e.candidate)CH.postMessage({type:'vcall_ice',from:'family',candidate:e.candidate});};
}

async function handleOffer(sdp){
  if(!S.peerConn)await startCallAsFamily();
  await S.peerConn.setRemoteDescription(new RTCSessionDescription(sdp));
  const answer=await S.peerConn.createAnswer();
  await S.peerConn.setLocalDescription(answer);
  CH.postMessage({type:'vcall_answer',from:'family',sdp:answer});
  S.callState='active';startCallTimer();showCallUI();render();
}

async function handleAnswer(sdp){
  if(!S.peerConn)return;
  await S.peerConn.setRemoteDescription(new RTCSessionDescription(sdp));
}

function handleIce(candidate){
  if(S.peerConn&&candidate)S.peerConn.addIceCandidate(new RTCIceCandidate(candidate)).catch(()=>{});
}

function hangUp(notify=true){
  if(S.vcallInterval){clearInterval(S.vcallInterval);S.vcallInterval=null;}
  if(S.localStream){S.localStream.getTracks().forEach(t=>t.stop());S.localStream=null;}
  if(S.peerConn){S.peerConn.close();S.peerConn=null;}
  S.remoteStream=null;S.callState='idle';S.vcallTimer=0;
  const ov=document.getElementById('vcall-overlay');if(ov)ov.remove();
  if(notify)CH.postMessage({type:'vcall_hangup',from:S.role});
  render();
}

function startCallTimer(){
  S.vcallTimer=0;
  if(S.vcallInterval)clearInterval(S.vcallInterval);
  S.vcallInterval=setInterval(()=>{S.vcallTimer++;const el=document.getElementById('vcall-timer');if(el)el.textContent=fmtCallTime(S.vcallTimer);},1000);
}

function showCallUI(){
  let ov=document.getElementById('vcall-overlay');
  if(!ov){
    ov=document.createElement('div');ov.id='vcall-overlay';ov.className='vcall-overlay';
    document.body.appendChild(ov);
  }
  const remoteLabel=S.role==='patient'?'Family':'Patient 01';
  const localLabel=S.role==='patient'?'You (Patient)':'You (Family)';
  ov.innerHTML=`
    <div class="vcall-box">
      <div style="font-family:'DM Serif Display',serif;font-size:18px;color:rgba(200,190,240,0.9)">Video call</div>
      <div class="vcall-videos">
        <div class="vcall-vid-wrap">
          <video id="vcall-remote" autoplay playsinline style="width:100%;height:100%;object-fit:cover;"></video>
          <div class="vcall-vid-label">${remoteLabel}</div>
        </div>
        <div class="vcall-vid-wrap">
          <video id="vcall-local" autoplay muted playsinline style="width:100%;height:100%;object-fit:cover;transform:scaleX(-1);"></video>
          <div class="vcall-vid-label">${localLabel}</div>
        </div>
      </div>
      <div class="vcall-timer" id="vcall-timer">${fmtCallTime(S.vcallTimer)}</div>
      <div class="vcall-controls">
        <button class="btn btn-red" onclick="hangUp(true)">End call</button>
      </div>
    </div>`;
  const remVid=document.getElementById('vcall-remote');
  const locVid=document.getElementById('vcall-local');
  if(remVid&&S.remoteStream)remVid.srcObject=S.remoteStream;
  if(locVid&&S.localStream)locVid.srcObject=S.localStream;
}

/* ── BroadcastChannel ── */
CH.onmessage=e=>{
  const d=e.data;
  if(d.type==='ping')handlePing(d.from);
  if(d.type==='pong')handlePong(d.from);

  /* state updates for family/nurse */
  if(d.type==='state_update'&&(S.role==='family'||S.role==='nurse')){
    Object.assign(S,{eyeState:d.eyeState,confidence:d.confidence,lastEAR:d.lastEAR,
      alertsToday:d.alertsToday,motionAlertsToday:d.motionAlertsToday,events:d.events,
      motionLevel:d.motionLevel,remoteSegments:d.segments,remoteSleepMs:d.totalSleepMs,
      remoteAwakeMs:d.totalAwakeMs,remoteSessionMs:d.sessionMs,remoteBlinkCount:d.blinkCount,remoteSleepPct:d.sleepPct});
    if(S.role==='family'){
      if(d.eyeState==='awake'&&!S.familyAlerted){S.familyAlerted=true;S.notifications.unshift({id:now(),title:S.patientName+' is awake',sub:'Eyes open · '+tsShort(),type:'awake',ts:tsShort()});playTone([880,880,1100]);}
      if(d.eyeState==='asleep'&&S.familyAlerted){S.familyAlerted=false;S.notifications.unshift({id:now(),title:S.patientName+' fell asleep',sub:'Sleep detected · '+tsShort(),type:'sleep',ts:tsShort()});}
    }
    if(S.role==='nurse'){
      if(d.eyeState==='awake'&&!S.nurseAlerted){S.nurseAlerted=true;S.nurseNotifications.unshift({id:now(),type:'eye',title:'Awake — '+S.patientName,sub:S.patientRoom+' · '+tsShort(),priority:'medium',ts:tsShort()});playTone([660,880]);}
      if(d.eyeState==='asleep')S.nurseAlerted=false;
      const t=now();
      if(d.motionLevel>MOTION_ALERT&&(t-S.nurseMotionCooldown)>15000){S.nurseMotionCooldown=t;const hi=d.motionLevel>MOTION_HIGH;S.nurseNotifications.unshift({id:t,type:'motion',title:(hi?'High':'Elevated')+' movement',sub:S.patientName+' · '+d.motionLevel+'% · '+tsShort(),priority:hi?'high':'medium',ts:tsShort()});playTone(hi?[440,550,660]:[550,660]);S.motionAlertsToday++;}
      if(d.eyeState==='asleep'&&S._prevEyeState!=='asleep'){S.nurseNotifications.unshift({id:now(),type:'sleep',title:'Sleep detected — '+S.patientName,sub:S.patientRoom+' · '+tsShort(),priority:'low',ts:tsShort()});playTone([440,330]);}
      S._prevEyeState=d.eyeState;
    }
    render();
  }

  if(d.type==='frame'&&(S.role==='family'||S.role==='nurse')){
    S.lastFrame=d.data;
    setTimeout(()=>drawFeedFrame(S.role==='family'?'familyFeedCanvas':'nurseFeedCanvas'),20);
  }

  /* ── Chat ── */
  if(d.type==='chat'){
    const isMine=d.from===S.role;
    const roleLabels={patient:'Patient 01',family:'Family',nurse:'Nurse'};
    S.messages.push({from:d.from,isMine,label:roleLabels[d.from]||d.from,text:d.text,time:d.time});
    render();setTimeout(()=>{const ml=document.getElementById('msg-list');if(ml)ml.scrollTop=ml.scrollHeight;},50);
  }

  /* ── Video call signalling ── */
  /* Family requests a call → nurse sees approval request */
  if(d.type==='vcall_request'&&S.role==='nurse'){
    S.callState='pending_nurse';S.callRequestId=d.id;
    S.nurseNotifications.unshift({id:now(),type:'vcall_req',title:'Family requests video call',sub:S.patientName+' · '+tsShort(),priority:'high',ts:tsShort(),callId:d.id});
    playTone([660,770,880]);render();
  }
  /* Nurse approves → patient and family start WebRTC */
  if(d.type==='vcall_approved'){
    if(S.role==='patient'){
      addSystemMsg('Nurse approved family video call. Connecting…');
      startCallAsPatient();
    }
    if(S.role==='family'){
      S.callState='approved';
      addSystemMsg('Nurse approved your call request. Connecting…');
      render();
    }
  }
  /* Nurse denies */
  if(d.type==='vcall_denied'){
    if(S.role==='family'){S.callState='idle';addSystemMsg('The nurse declined the call request at this time.');render();}
    if(S.role==='patient'){addSystemMsg('Family call request was declined by nurse.');render();}
  }
  /* WebRTC offer (patient → family) */
  if(d.type==='vcall_offer'&&S.role==='family'){handleOffer(d.sdp);}
  /* WebRTC answer (family → patient) */
  if(d.type==='vcall_answer'&&S.role==='patient'){handleAnswer(d.sdp);}
  /* ICE */
  if(d.type==='vcall_ice'&&d.from!==S.role){handleIce(d.candidate);}
  /* Hang up */
  if(d.type==='vcall_hangup'&&d.from!==S.role){hangUp(false);}
};

function addSystemMsg(text){
  S.messages.push({from:'system',isMine:false,label:'System',text,time:tsShort(),isSystem:true});
}

function handlePing(from){
  if(from==='patient'&&(S.role==='family'||S.role==='nurse')){S.patientConnected=true;CH.postMessage({type:'pong',from:S.role});render();}
  if(from==='family'&&(S.role==='patient'||S.role==='nurse')){S.familyConnected=true;CH.postMessage({type:'pong',from:S.role});render();}
  if(from==='nurse'&&(S.role==='patient'||S.role==='family')){S.nurseConnected=true;CH.postMessage({type:'pong',from:S.role});render();}
}
function handlePong(from){
  if(from==='patient')S.patientConnected=true;
  if(from==='family')S.familyConnected=true;
  if(from==='nurse')S.nurseConnected=true;
  render();
}

function playTone(freqs){try{const ctx=new AudioContext();freqs.forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;const t=ctx.currentTime+i*0.18;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.25,t+0.04);g.gain.linearRampToValueAtTime(0,t+0.2);o.start(t);o.stop(t+0.2);});}catch(e){}}

/* ── MediaPipe ── */
function loadMediaPipe(){
  return new Promise((res,rej)=>{
    if(typeof FaceMesh!=='undefined'){res();return;}
    S.mpStatus='loading';updateMpChip();
    const s1=document.createElement('script');s1.src='https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js';s1.crossOrigin='anonymous';
    s1.onload=()=>{
      const s2=document.createElement('script');s2.src='https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js';s2.crossOrigin='anonymous';
      s2.onload=()=>{if(typeof FaceMesh!=='undefined'){S.mpStatus='ready';updateMpChip();res();}else{S.mpStatus='error';updateMpChip();rej(new Error('FaceMesh undefined'));}};
      s2.onerror=()=>{S.mpStatus='error';updateMpChip();rej(new Error('face_mesh.js failed'));};
      document.head.appendChild(s2);
    };
    s1.onerror=()=>{S.mpStatus='error';updateMpChip();rej(new Error('camera_utils.js failed'));};
    document.head.appendChild(s1);
  });
}
function updateMpChip(){const el=document.getElementById('mp-chip');if(!el)return;const labels={idle:'MP: idle',loading:'MP: loading…',ready:'MP: ready',error:'MP: error'};const cls={idle:'mp-idle',loading:'mp-loading',ready:'mp-ready',error:'mp-error'};el.textContent=labels[S.mpStatus];el.className='mp-chip '+(cls[S.mpStatus]||'mp-idle');}

function drawEye(ctx,lm,idx,W,H,color){ctx.beginPath();idx.forEach((i,j)=>{const p=lm[i];j===0?ctx.moveTo(p.x*W,p.y*H):ctx.lineTo(p.x*W,p.y*H);});ctx.closePath();ctx.strokeStyle=color;ctx.lineWidth=1.6;ctx.stroke();ctx.fillStyle=color.replace('0.9','0.12');ctx.fill();}
function eyeColor(){return S.sleepState==='awake'?'rgba(76,201,138,0.9)':S.sleepState==='asleep'?'rgba(68,114,196,0.9)':S.sleepState==='blinking'?'rgba(240,165,0,0.9)':'rgba(168,156,196,0.8)';}
let frameThrottle=0;
function sendFrame(vid,overlay){
  const t=now();if(t-frameThrottle<230)return;frameThrottle=t;
  try{const off=document.createElement('canvas');off.width=vid.videoWidth||320;off.height=vid.videoHeight||240;const ctx=off.getContext('2d');ctx.save();ctx.scale(-1,1);ctx.drawImage(vid,-off.width,0,off.width,off.height);ctx.restore();if(overlay&&overlay.width>0)ctx.drawImage(overlay,0,0,off.width,off.height);CH.postMessage({type:'frame',data:off.toDataURL('image/jpeg',0.42)});}catch(e){}
}
function drawFeedFrame(id){if(!S.lastFrame)return;const c=document.getElementById(id);if(!c)return;const img=new Image();img.onload=()=>{c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);};img.src=S.lastFrame;}

async function startCamera(){
  S.isMonitoring=true;S.sessionStart=now();S.earHistory=[];S.motionHistory=[];
  S.prevLandmarks=null;S.lidOpen=true;S.lidStart=null;S.frameCount=0;
  S.segments=[];S.currentSeg=null;S.totalSleepMs=0;S.totalAwakeMs=0;S.blinkCount=0;
  S.sleepState='unknown';S.sleepStateStart=now();render();
  try{await loadMediaPipe();}catch(err){addEvent('error','MediaPipe: '+err.message);S.isMonitoring=false;render();return;}
  try{S.faceMesh=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});S.faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});}
  catch(err){addEvent('error','FaceMesh init: '+err.message);S.isMonitoring=false;render();return;}
  S.faceMesh.onResults(results=>{
    const vid=document.getElementById('pVid'),canvas=document.getElementById('pCanvas');
    if(!canvas||!vid)return;
    const ctx=canvas.getContext('2d');const W=vid.videoWidth||640,H=vid.videoHeight||480;
    canvas.width=W;canvas.height=H;ctx.clearRect(0,0,W,H);
    if(results.multiFaceLandmarks?.length){
      const lm=results.multiFaceLandmarks[0];const col=eyeColor();
      drawEye(ctx,lm,LEFT_EYE,W,H,col);drawEye(ctx,lm,RIGHT_EYE,W,H,col);
      ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font='10px DM Mono, monospace';ctx.fillText('EAR '+S.lastEAR.toFixed(3),8,H-8);
      if(S.isMonitoring)processFrame(lm);
      const fd=document.getElementById('ps-face');if(fd){fd.textContent='face ✓';fd.style.color='#4cc98a';}
    }else{
      const fd=document.getElementById('ps-face');if(fd){fd.textContent='no face';fd.style.color='#a89cc4';}
      if(S.isMonitoring){S.confidence=0;broadcastState();updatePatientLive();}
    }
    sendFrame(vid,canvas);
  });
  const vid=document.getElementById('pVid');if(!vid){S.isMonitoring=false;render();return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:640},height:{ideal:480},facingMode:'user'}});
    vid.srcObject=stream;
    await new Promise((res,rej)=>{vid.onloadedmetadata=()=>vid.play().then(res).catch(rej);setTimeout(rej,6000);});
    S.mpCamera=new Camera(vid,{onFrame:async()=>{if(vid.readyState>=2&&S.isMonitoring){try{await S.faceMesh.send({image:vid});}catch(e){}}},width:640,height:480});
    S.mpCamera.start();addEvent('info','Monitoring started');render();
  }catch(err){S.isMonitoring=false;addEvent('error','Camera: '+err.message);render();}
}

function stopCamera(){
  S.isMonitoring=false;
  if(S.currentSeg){S.currentSeg.end=now();S.currentSeg.dur=now()-S.currentSeg.start;S.segments.push({...S.currentSeg});S.currentSeg=null;}
  if(S.mpCamera){try{S.mpCamera.stop();}catch(e){}S.mpCamera=null;}
  if(S.faceMesh){try{S.faceMesh.close();}catch(e){}S.faceMesh=null;}
  const vid=document.getElementById('pVid');if(vid?.srcObject){vid.srcObject.getTracks().forEach(t=>t.stop());vid.srcObject=null;}
  addEvent('info','Monitoring stopped');broadcastState();render();
}

function sendMsg(){
  const inp=document.getElementById('msg-input');if(!inp||!inp.value.trim())return;
  const text=inp.value.trim(),time=tsShort();inp.value='';
  const roleLabels={patient:'Patient 01',family:'Family',nurse:'Nurse'};
  S.messages.push({from:S.role,isMine:true,label:roleLabels[S.role],text,time});
  CH.postMessage({type:'chat',from:S.role,text,time});
  render();setTimeout(()=>{const ml=document.getElementById('msg-list');if(ml)ml.scrollTop=ml.scrollHeight;},50);
}

/* ── Family requests call ── */
function requestCall(){
  if(S.callState!=='idle')return;
  const id='cr_'+now();
  S.callState='pending_nurse';S.callRequestId=id;
  CH.postMessage({type:'vcall_request',from:'family',id});
  addSystemMsg('Call request sent — waiting for nurse approval…');
  render();
}

/* ── Nurse approves/denies ── */
function nurseApproveCall(callId){
  S.callState='idle';
  S.nurseNotifications.forEach(n=>{if(n.callId===callId)n.acked=true;});
  CH.postMessage({type:'vcall_approved',callId});
  addSystemMsg('You approved the family video call.');
  render();
}
function nurseDenyCall(callId){
  S.callState='idle';
  S.nurseNotifications.forEach(n=>{if(n.callId===callId)n.acked=true;});
  CH.postMessage({type:'vcall_denied',callId});
  addSystemMsg('You declined the family video call request.');
  render();
}

/* ── Live update ── */
function updatePatientLive(){
  const el=id=>document.getElementById(id);
  const stateLabels={awake:'Awake',asleep:'Asleep',blinking:'Blinking',unknown:'Detecting…'};
  if(el('ps-state-big')){const cls={awake:'awake',asleep:'asleep',blinking:'blinking',unknown:''};el('ps-state-big').textContent=stateLabels[S.sleepState]||'—';el('ps-state-big').className='eye-state-big '+(cls[S.sleepState]||'');}
  if(el('ps-badge')){const bclass={awake:'sb-awake',asleep:'sb-asleep',blinking:'sb-blink',unknown:'sb-unknown'};el('ps-badge').className='state-badge '+(bclass[S.sleepState]||'sb-unknown');el('ps-badge').textContent=stateLabels[S.sleepState]||'—';}
  const earPct=Math.max(0,Math.min(100,Math.round(S.lastEAR/0.4*100)));
  if(el('ps-ear-fill')){const col=S.sleepState==='awake'?'#4cc98a':S.sleepState==='asleep'?'#4472c4':S.sleepState==='blinking'?'#f0a500':'#a89cc4';el('ps-ear-fill').style.width=earPct+'%';el('ps-ear-fill').style.background=col;}
  if(el('ps-ear-val'))el('ps-ear-val').textContent=S.lastEAR.toFixed(3);
  const mc=S.motionLevel>MOTION_HIGH?'#f06060':S.motionLevel>MOTION_ALERT?'#f0a500':'#4cc98a';
  if(el('ps-motion-fill')){el('ps-motion-fill').style.width=S.motionLevel+'%';el('ps-motion-fill').style.background=mc;}
  if(el('ps-motion-val')){el('ps-motion-val').textContent=S.motionLevel+'%';el('ps-motion-val').style.color=mc;}
  if(el('ps-sleep-dur'))el('ps-sleep-dur').textContent=fmtDur(currentSleepMs());
  if(el('ps-awake-dur'))el('ps-awake-dur').textContent=fmtDur(currentAwakeMs());
  if(el('ps-sleep-pct'))el('ps-sleep-pct').textContent=sleepPct()+'%';
  if(el('ps-blinks'))el('ps-blinks').textContent=S.blinkCount;
  if(el('ps-frames'))el('ps-frames').textContent='f:'+S.frameCount;
  if(el('ps-face-time'))el('ps-face-time').textContent=fmtDur(now()-S.sleepStateStart)+' in state';
  renderTimelineInline('ps-timeline');
  if(el('ps-evlist'))el('ps-evlist').innerHTML=evHTML(S.events.slice(0,8));
}

function renderTimelineInline(id){const el=document.getElementById(id);if(!el)return;const segs=getTimelineSegments();const totMs=totalSessionMs();if(totMs<500){el.innerHTML='<div style="font-size:11px;color:var(--ink4);padding:8px 0;font-style:italic">Timeline builds as monitoring runs…</div>';return;}el.innerHTML=timelineHTML(segs,totMs);}

function timelineHTML(segs,totMs){
  const colMap={awake:'var(--green)',asleep:'var(--sleep)',blinking:'var(--blink)',unknown:'rgba(168,156,196,0.3)'};
  const bars=segs.map(seg=>{const pct=Math.max(0.2,Math.min(100,((seg.dur||0)/totMs)*100));const col=colMap[seg.state]||'rgba(168,156,196,0.3)';const label=seg.state==='asleep'?fmtDurMin(seg.dur||0):'';return `<div class="tl-segment" style="width:${pct}%;background:${col};" title="${seg.state} · ${fmtDur(seg.dur||0)}">${label?`<span style="font-size:8px;color:white;opacity:0.8;padding:0 3px;line-height:28px;white-space:nowrap;overflow:hidden;">${label}</span>`:''}</div>`;}).join('');
  return `<div class="timeline-track">${bars||'<div style="width:100%;background:rgba(168,156,196,0.15);"></div>'}</div>
  <div style="display:flex;justify-content:space-between;font-size:9.5px;color:var(--ink4);font-family:'DM Mono',monospace;margin-bottom:8px;"><span>0s</span><span>${fmtDur(totMs/2)}</span><span>${fmtDur(totMs)}</span></div>
  <div class="tl-legend"><div class="tl-leg-item"><div class="tl-leg-dot" style="background:var(--green);"></div>Awake</div><div class="tl-leg-item"><div class="tl-leg-dot" style="background:var(--sleep);"></div>Asleep</div><div class="tl-leg-item"><div class="tl-leg-dot" style="background:var(--amber);"></div>Blinking</div></div>`;
}

function evHTML(evs){
  if(!evs?.length)return '<div style="font-size:12px;color:var(--ink4);font-style:italic">No events yet.</div>';
  const col={awake:'var(--green)',asleep:'var(--sleep)',blinking:'var(--amber)',motion:'var(--amber)',error:'var(--red)',info:'var(--ink4)'};
  return evs.map(e=>`<div class="ev-item"><div class="ev-pip" style="background:${col[e.type]||'var(--ink4)'}"></div><div><div style="font-size:12px;color:var(--ink);line-height:1.4">${e.text}</div><div style="font-size:10px;color:var(--ink3)">${e.time}</div></div></div>`).join('');
}

function connChip(on,label){return `<div class="conn-chip ${on?'conn-on':'conn-off'}">${on?'<span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-right:4px;vertical-align:middle;"></span>':''}${label}</div>`;}

/* ── Chat HTML — now shows sender label clearly ── */
function msgListHTML(){
  if(!S.messages.length)return '<div style="font-size:11px;color:var(--ink4);font-style:italic">No messages yet.</div>';
  const roleColors={patient:'#1e7a4e',family:'#5a3aaa',nurse:'#7a4a00',system:'var(--ink4)'};
  return S.messages.map(m=>{
    if(m.isSystem){return `<div style="display:flex;justify-content:center;"><div class="mb-system">${m.text}</div></div>`;}
    const bubbleCls=m.isMine?'mb-me':(m.from==='patient'?'mb-patient':m.from==='nurse'?'mb-nurse':'mb-family');
    const labelColor=roleColors[m.from]||'var(--ink4)';
    return `<div class="msg-bubble-wrap ${m.isMine?'is-me':'is-other'}">
      <div class="msg-sender-label" style="color:${labelColor}">${m.label}</div>
      <div class="${bubbleCls}">${m.text}</div>
      <div class="msg-time">${m.time}</div>
    </div>`;
  }).join('');
}

function msgBox(placeholder){
  return `<div class="gc" style="padding:13px 15px;">
    <div class="eyebrow">Messages</div>
    <div class="msg-list" id="msg-list">${msgListHTML()}</div>
    <div class="msg-row"><input class="msg-inp" id="msg-input" placeholder="${placeholder}" onkeydown="if(event.key==='Enter')sendMsg()"/>
    <button class="btn btn-primary" style="padding:8px 12px" onclick="sendMsg()"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M10 1L4.5 6M10 1L7 10L4.5 6M10 1L1 4L4.5 6" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div></div>`;
}

function remoteTimelineHTML(){const segs=S.remoteSegments||[];const totMs=S.remoteSessionMs||0;if(totMs<500)return '<div style="font-size:11px;color:var(--ink4);font-style:italic">Waiting for patient monitoring…</div>';return timelineHTML(segs,totMs);}

/* ── Renders ── */

      <div class="rs-card" onclick="setRole('nurse')"><div class="rs-icon" style="background:var(--amber-dim);border:1.5px solid var(--amber-border);"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="3" y="4" width="16" height="14" rx="2" stroke="#7a4a00" stroke-width="1.3"/><path d="M11 8v5M8.5 10.5h5" stroke="#7a4a00" stroke-width="1.3" stroke-linecap="round"/><path d="M7 4V3M15 4V3" stroke="#7a4a00" stroke-width="1.2" stroke-linecap="round"/></svg></div><div class="rs-title">Nurse station</div><div class="rs-desc">Alerts, timeline, and gatekeeper for family video calls.</div></div>

function renderPatient(){
  const segs=getTimelineSegments(),totMs=totalSessionMs();
  const stateClass={awake:'awake',asleep:'asleep',blinking:'blinking',unknown:''}[S.sleepState]||'';
  const stateLabel={awake:'Awake',asleep:'Asleep',blinking:'Blinking',unknown:S.isMonitoring?'Detecting…':'Not started'}[S.sleepState]||'—';
  const badgeCls={awake:'sb-awake',asleep:'sb-asleep',blinking:'sb-blink',unknown:'sb-unknown'}[S.sleepState]||'sb-unknown';
  const mc=S.motionLevel>MOTION_HIGH?'#f06060':S.motionLevel>MOTION_ALERT?'#f0a500':'#4cc98a';
  const mpCls={idle:'mp-idle',loading:'mp-loading',ready:'mp-ready',error:'mp-error'}[S.mpStatus]||'mp-idle';
  const mpLbl={idle:'MP: idle',loading:'MP: loading…',ready:'MP: ready',error:'MP: error'}[S.mpStatus];
  const earPct=Math.max(0,Math.min(100,Math.round(S.lastEAR/0.4*100)));
  const openThreshPct=Math.round(EAR_OPEN/0.4*100);
  const blinkThreshPct=Math.round(EAR_BLINK/0.4*100);

  const callBanner=S.callState==='active'?`<div class="alert-banner ab-purple" style="margin-bottom:14px;"><div style="display:flex;align-items:center;gap:10px;"><div style="width:34px;height:34px;border-radius:50%;background:var(--purple-dim);border:1px solid rgba(155,107,240,0.35);display:flex;align-items:center;justify-content:center;animation:breathe 1.5s infinite;"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="3" width="11" height="7" rx="1.5" stroke="var(--purple)" stroke-width="1.1"/><path d="M9 6.5l3-2v5l-3-2" stroke="var(--purple)" stroke-width="1.1" stroke-linejoin="round"/></svg></div><div><div style="font-family:'DM Serif Display',serif;font-size:16px;color:var(--ink)">Video call active</div><div style="font-size:11px;color:#5a3aaa;">Family connected</div></div></div><button class="btn btn-red" onclick="hangUp(true)">End call</button></div>`:'';

  const camContent=S.isMonitoring
    ?`<video id="pVid" autoplay muted playsinline style="width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1);border-radius:16px;"></video>
       <canvas id="pCanvas" style="position:absolute;inset:0;width:100%;height:100%;transform:scaleX(-1);pointer-events:none;border-radius:16px;"></canvas>
       <div class="cam-overlay-lbl">MEDIAPIPE · ${S.patientRoom}</div>
       <div class="cam-rec"><div class="rdot"></div><span class="rtxt">LIVE</span></div>
       <div style="position:absolute;bottom:10px;right:12px;display:flex;gap:8px;align-items:center;">
         <span style="font-family:'DM Mono',monospace;font-size:9px;color:rgba(200,190,240,0.5)" id="ps-face">—</span>
         <span style="font-family:'DM Mono',monospace;font-size:9px;color:rgba(200,190,240,0.3)" id="ps-frames">f:0</span>
       </div>
       <div style="position:absolute;top:10px;left:12px;"><span class="state-badge ${badgeCls}" id="ps-badge">${stateLabel}</span></div>`
    :`<div style="position:absolute;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;" onclick="startCamera()">
        <div style="width:52px;height:52px;border-radius:50%;border:1.5px solid rgba(180,170,222,0.35);display:flex;align-items:center;justify-content:center;">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8.5" stroke="rgba(180,170,222,0.5)" stroke-width="1"/><polygon points="8,6 15,10 8,14" fill="rgba(180,170,222,0.7)"/></svg>
        </div>
        <div style="font-size:12px;color:rgba(180,170,222,0.5)">Start monitoring</div>
      </div>`;

  return `<div style="padding:20px 24px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div><div style="font-family:'DM Serif Display',serif;font-size:26px;color:var(--ink)">${S.patientName}</div><div style="font-size:12px;color:var(--ink3);margin-top:2px">${S.patientRoom} · ${S.patientWard}</div></div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;"><span class="mp-chip ${mpCls}" id="mp-chip">${mpLbl}</span>${connChip(S.familyConnected,'Family')}${connChip(S.nurseConnected,'Nurse')}</div>
    </div>
    ${callBanner}
    <div style="display:grid;grid-template-columns:1fr 252px;gap:14px;align-items:start;">
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="camwrap" style="min-height:268px;position:relative;">${camContent}</div>
        <div class="gc" style="padding:15px 17px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
            <div><div class="eyebrow">Eye aspect ratio</div><div class="eye-state-big ${stateClass}" id="ps-state-big">${stateLabel}</div><div id="ps-face-time" style="font-size:11px;color:var(--ink4);margin-top:3px">${S.isMonitoring?fmtDur(now()-S.sleepStateStart)+' in state':'Click start camera'}</div></div>
            <div style="text-align:right;"><div style="font-family:'DM Mono',monospace;font-size:22px;color:var(--ink3)" id="ps-ear-val">${S.lastEAR.toFixed(3)}</div><div style="font-size:10px;color:var(--ink4)">EAR value</div></div>
          </div>
          <div style="position:relative;margin-bottom:18px;">
            <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--ink4);margin-bottom:4px;font-family:'DM Mono',monospace;"><span>0.0</span><span style="color:var(--sleep)">← sleep ·${EAR_BLINK}</span><span style="color:var(--amber)">blink ·${EAR_OPEN}</span><span style="color:var(--green)">awake →</span><span>0.4</span></div>
            <div class="ear-bar-wrap"><div class="ear-bar-fill" id="ps-ear-fill" style="width:${earPct}%;background:#4cc98a;"></div><div class="ear-thresh-line" style="left:${blinkThreshPct}%;"></div><div class="ear-thresh-line" style="left:${openThreshPct}%;background:rgba(76,201,138,0.6);"></div></div>
            <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--ink4);margin-top:3px;font-family:'DM Mono',monospace;"><span>eyes closed</span><span>blinking</span><span>eyes open</span></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink3);margin-bottom:4px;"><span>Movement</span><span id="ps-motion-val" style="font-family:'DM Mono',monospace;color:${mc}">${S.motionLevel}%</span></div>
          <div style="height:5px;background:rgba(155,107,240,0.1);border-radius:99px;overflow:hidden;margin-bottom:12px;"><div id="ps-motion-fill" style="height:100%;border-radius:99px;width:${S.motionLevel}%;background:${mc};transition:width 0.3s;"></div></div>
        </div>
        <div class="timeline-wrap"><div class="eyebrow">Sleep / wake timeline</div><div id="ps-timeline">${totMs<500?'<div style="font-size:11px;color:var(--ink4);font-style:italic">Timeline builds as monitoring runs…</div>':timelineHTML(segs,totMs)}</div></div>
        <div style="display:flex;gap:8px;">${S.isMonitoring?`<button class="btn btn-primary" onclick="stopCamera()">Stop monitoring</button>`:`<button class="btn btn-primary" onclick="startCamera()">Start monitoring</button>`}<button class="btn btn-ghost" onclick="S.role=null;render()">Switch view</button></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="gc" style="padding:14px 16px;">
          <div class="eyebrow">Session stats</div>
          <div class="sleep-grid">
            <div class="stat-card"><div class="stat-val" style="font-size:20px;color:var(--sleep)" id="ps-sleep-dur">${fmtDur(currentSleepMs())}</div><div class="stat-lbl">Sleep</div></div>
            <div class="stat-card"><div class="stat-val" style="font-size:20px;color:var(--green)" id="ps-awake-dur">${fmtDur(currentAwakeMs())}</div><div class="stat-lbl">Awake</div></div>
            <div class="stat-card"><div class="stat-val" style="font-size:20px;" id="ps-sleep-pct">${sleepPct()}%</div><div class="stat-lbl">Sleep%</div></div>
          </div>
          <div style="display:flex;justify-content:space-between;padding:8px 10px;background:rgba(155,107,240,0.06);border-radius:9px;">
            <div style="font-size:11px;color:var(--ink3);">Blinks detected</div>
            <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--ink)" id="ps-blinks">${S.blinkCount}</div>
          </div>
        </div>
        <div class="gc" style="padding:14px 16px;"><div class="eyebrow">Events</div><div class="ev-list" id="ps-evlist">${evHTML(S.events.slice(0,8))}</div></div>
        ${msgBox('Message family or nurse…')}
      </div>
    </div>
  </div>`;
}

function renderFamily(){
  const state=S.eyeState||'unknown';
  const isAwake=state==='awake',isAsleep=state==='asleep';
  const sp=S.remoteSleepPct||0;
  const callPending=S.callState==='pending_nurse';
  const callActive=S.callState==='active';
  const callApproved=S.callState==='approved';

  const callSection=`<div class="gc" style="padding:14px 16px;margin-bottom:12px;">
    <div class="eyebrow">Video call</div>
    ${callActive
      ?`<div style="display:flex;align-items:center;gap:10px;"><div style="width:8px;height:8px;border-radius:50%;background:var(--green);animation:breathe 1.5s infinite;"></div><span style="font-size:13px;color:var(--ink)">Call active</span><button class="btn btn-red" style="margin-left:auto" onclick="hangUp(true)">End call</button></div>`
      :callPending
      ?`<div style="display:flex;align-items:center;gap:8px;"><div style="width:8px;height:8px;border-radius:50%;background:var(--amber);animation:breathe 1.2s infinite;"></div><span style="font-size:12px;color:var(--ink3)">Waiting for nurse approval…</span></div>`
      :callApproved
      ?`<div style="font-size:12px;color:#1e7a4e;">Nurse approved — connecting…</div>`
      :`<button class="btn btn-primary" onclick="requestCall()"><svg width="11" height="11" viewBox="0 0 11 11" fill="none" style="margin-right:5px;vertical-align:middle;"><rect x="0.5" y="2" width="8" height="7" rx="1.5" stroke="white" stroke-width="1.1"/><path d="M8 5l2.5-2v5L8 6" stroke="white" stroke-width="1.1" stroke-linejoin="round"/></svg>Request video call</button>
      <div style="font-size:11px;color:var(--ink4);margin-top:6px;">Nurse must approve before connecting.</div>`
    }
  </div>`;

  return `<div style="padding:20px 24px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div><div style="font-family:'DM Serif Display',serif;font-size:26px;color:var(--ink)">Family view</div><div style="font-size:12px;color:var(--ink3);margin-top:2px">Watching ${S.patientName} · ${S.patientRoom}</div></div>
      <div style="display:flex;gap:6px;align-items:center;">${connChip(S.patientConnected,'Patient')}${connChip(S.nurseConnected,'Nurse')}<button class="btn btn-ghost" style="padding:6px 12px;font-size:11px" onclick="S.role=null;render()">Switch</button></div>
    </div>
    ${isAwake?`<div class="alert-banner ab-green"><div style="display:flex;align-items:center;gap:10px;"><div style="width:34px;height:34px;border-radius:50%;background:var(--green-dim);border:1px solid var(--green-border);display:flex;align-items:center;justify-content:center;animation:breathe 1.5s infinite;"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="var(--green)" stroke-width="1.2"/><path d="M4 6.5l2 2 3.5-3.5" stroke="var(--green)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div><div style="font-family:'DM Serif Display',serif;font-size:17px;color:var(--ink)">${S.patientName} is awake</div><div style="font-size:12px;color:#1e7a4e;margin-top:1px">Eyes open detected</div></div></div></div>`:''}
    ${isAsleep?`<div class="alert-banner ab-blue"><div style="display:flex;align-items:center;gap:10px;"><div style="width:34px;height:34px;border-radius:50%;background:var(--blue-dim);border:1px solid var(--blue-border);display:flex;align-items:center;justify-content:center;"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="var(--blue)" stroke-width="1.2"/><path d="M4.5 8.5C5 7 8 7 8.5 5.5" stroke="var(--blue)" stroke-width="1.2" stroke-linecap="round"/></svg></div><div><div style="font-family:'DM Serif Display',serif;font-size:17px;color:var(--ink)">${S.patientName} is sleeping</div><div style="font-size:12px;color:#1e3e7a;margin-top:1px">Sleep confirmed</div></div></div></div>`:''}
    <div style="display:grid;grid-template-columns:1fr 250px;gap:14px;align-items:start;">
      <div style="display:flex;flex-direction:column;gap:12px;">
        ${S.lastFrame?`<div style="position:relative;"><canvas id="familyFeedCanvas" style="width:100%;border-radius:18px;display:block;min-height:240px;background:#0c0a16;"></canvas><div class="cam-overlay-lbl">LIVE · ${S.patientRoom.toUpperCase()}</div><div style="position:absolute;top:10px;right:12px;"><span class="state-badge ${{awake:'sb-awake',asleep:'sb-asleep',blinking:'sb-blink',unknown:'sb-unknown'}[state]||'sb-unknown'}">${{awake:'Awake',asleep:'Asleep',blinking:'Blinking',unknown:'—'}[state]||'—'}</span></div></div>`
        :`<div class="camwrap" style="min-height:240px;"><div style="font-size:12px;color:rgba(180,170,222,0.4)">Waiting for patient feed</div></div>`}
        <div class="timeline-wrap"><div class="eyebrow">Sleep / wake timeline</div><div>${remoteTimelineHTML()}</div></div>
        ${msgBox('Send a message…')}
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        ${callSection}
        <div class="gc" style="padding:14px 16px;">
          <div class="sleep-grid" style="grid-template-columns:1fr 1fr;">
            <div class="stat-card"><div class="stat-val" style="font-size:18px;color:${isAwake?'var(--green)':isAsleep?'var(--sleep)':'var(--ink3)'};padding-top:3px">${{awake:'Awake',asleep:'Asleep',blinking:'Blinking',unknown:'—'}[state]||'—'}</div><div class="stat-lbl">State</div></div>
            <div class="stat-card"><div class="stat-val" style="font-size:18px;padding-top:3px">${sp}%</div><div class="stat-lbl">Sleep%</div></div>
          </div>
          <div class="eyebrow" style="margin-top:10px;">Notifications</div>
          <div style="max-height:220px;overflow-y:auto;">
            ${S.notifications.length===0?'<div style="font-size:11px;color:var(--ink4);font-style:italic">No alerts yet.</div>'
            :S.notifications.slice(0,8).map(n=>{const isS=n.type==='sleep';const col=isS?'var(--sleep)':'var(--green)';return `<div class="gc notif-card"><div class="notif-icon" style="background:${col}22;border:1px solid ${col}55;"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><circle cx="5.5" cy="5.5" r="4.5" stroke="${col}" stroke-width="1.1"/></svg></div><div><div style="font-size:12px;color:var(--ink);font-weight:500">${n.title}</div><div style="font-size:11px;color:var(--ink3)">${n.sub}</div></div></div>`;}).join('')}
          </div>
        </div>
        <div class="gc" style="padding:14px 16px;"><div class="eyebrow">Recent events</div><div class="ev-list">${evHTML((S.events||[]).slice(0,5))}</div></div>
      </div>
    </div>
  </div>`;
}

function renderNurse(){
  const state=S.eyeState||'unknown';
  const isAwake=state==='awake';
  const hiM=S.motionLevel>MOTION_HIGH,medM=S.motionLevel>MOTION_ALERT;
  const unacked=(S.nurseNotifications||[]).filter(n=>!n.acked);
  const mc=hiM?'#f06060':medM?'#f0a500':'#4cc98a';
  const sp=S.remoteSleepPct||0;
  const slpMs=S.remoteSleepMs||0;

  /* pending call requests */
  const pendingCallReqs=(S.nurseNotifications||[]).filter(n=>n.type==='vcall_req'&&!n.acked);

  const callReqBanners=pendingCallReqs.map(n=>`
    <div class="call-req-banner">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:34px;height:34px;border-radius:50%;background:var(--purple-dim);border:1px solid rgba(155,107,240,0.4);display:flex;align-items:center;justify-content:center;animation:breathe 1.5s infinite;">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="3" width="9" height="7" rx="1.5" stroke="var(--purple)" stroke-width="1.1"/><path d="M10 6l3-2v5l-3-2" stroke="var(--purple)" stroke-width="1.1" stroke-linejoin="round"/></svg>
        </div>
        <div>
          <div style="font-family:'DM Serif Display',serif;font-size:16px;color:var(--ink)">Family requests video call</div>
          <div style="font-size:11px;color:var(--ink3);">${S.patientName} · ${n.ts}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-green" onclick="nurseApproveCall('${n.callId}')">Approve</button>
        <button class="btn btn-red" onclick="nurseDenyCall('${n.callId}')">Deny</button>
      </div>
    </div>`).join('');

  return `<div style="padding:20px 24px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div><div style="font-family:'DM Serif Display',serif;font-size:26px;color:var(--ink)">Nurse station</div><div style="font-size:12px;color:var(--ink3);margin-top:2px">${unacked.length?`<span style="color:#7a4a00;font-weight:500">${unacked.length} unacknowledged</span>`:'All clear'}</div></div>
      <div style="display:flex;gap:6px;align-items:center;">${connChip(S.patientConnected,'Patient')}${connChip(S.familyConnected,'Family')}<button class="btn btn-ghost" style="padding:6px 12px;font-size:11px" onclick="S.role=null;render()">Switch</button></div>
    </div>
    ${callReqBanners}
    ${isAwake?`<div class="alert-banner ab-green"><div style="display:flex;align-items:center;gap:10px;"><div style="width:34px;height:34px;border-radius:50%;background:var(--green-dim);border:1px solid var(--green-border);display:flex;align-items:center;justify-content:center;animation:breathe 1.5s infinite;"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="var(--green)" stroke-width="1.1"/><path d="M4 6.5l2 2 3.5-3.5" stroke="var(--green)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div><div style="font-family:'DM Serif Display',serif;font-size:16px;color:var(--ink)">${S.patientName} — awake</div><div style="font-size:11px;color:#1e7a4e;">Patient may need attention</div></div></div><button class="btn btn-green" onclick="S.nurseAlerted=false;render()">Acknowledge</button></div>`:''}
    ${hiM?`<div class="alert-banner ab-amber"><div style="display:flex;align-items:center;gap:10px;"><div style="width:34px;height:34px;border-radius:50%;background:var(--amber-dim);border:1px solid var(--amber-border);display:flex;align-items:center;justify-content:center;animation:breathe 1.4s infinite;"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1.5L12 11H1L6.5 1.5z" stroke="var(--amber)" stroke-width="1.1" stroke-linejoin="round"/><path d="M6.5 5.5v2.5M6.5 9.5v.5" stroke="var(--amber)" stroke-width="1.2" stroke-linecap="round"/></svg></div><div><div style="font-family:'DM Serif Display',serif;font-size:16px;color:var(--ink)">${S.patientName} — high movement (${S.motionLevel}%)</div><div style="font-size:11px;color:#7a4a00;">May be in distress</div></div></div><button class="btn btn-amber" onclick="S.nurseMotionCooldown=Date.now()+30000;render()">Acknowledge</button></div>`:''}

    <div style="display:grid;grid-template-columns:1fr 260px;gap:14px;align-items:start;">
      <div style="display:flex;flex-direction:column;gap:12px;">
        ${S.lastFrame?`<div style="position:relative;"><canvas id="nurseFeedCanvas" style="width:100%;border-radius:18px;display:block;min-height:230px;background:#0c0a16;"></canvas><div class="cam-overlay-lbl">LIVE · ${S.patientRoom.toUpperCase()}</div><div style="position:absolute;top:10px;right:12px;"><span class="state-badge ${{awake:'sb-awake',asleep:'sb-asleep',blinking:'sb-blink',unknown:'sb-unknown'}[state]||'sb-unknown'}">${{awake:'Awake',asleep:'Asleep',blinking:'Blinking',unknown:'—'}[state]||'—'}</span></div></div>`
        :`<div class="camwrap" style="min-height:230px;"><div style="font-size:12px;color:rgba(180,170,222,0.4)">Waiting for patient feed</div></div>`}
        <div class="gc" style="padding:14px 16px;">
          <div class="eyebrow">Live status</div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;">
            <div class="stat-card"><div class="stat-val" style="font-size:17px;padding-top:3px;color:${isAwake?'var(--green)':state==='asleep'?'var(--sleep)':'var(--ink3)'}">${{awake:'Open',asleep:'Asleep',blinking:'Drowsy',unknown:'—'}[state]||'—'}</div><div class="stat-lbl">Eyes</div></div>
            <div class="stat-card"><div class="stat-val" style="font-size:17px;padding-top:3px;color:${mc}">${S.motionLevel}%</div><div class="stat-lbl">Motion</div></div>
            <div class="stat-card"><div class="stat-val" style="font-size:17px;padding-top:3px;color:var(--sleep)">${fmtDur(slpMs)}</div><div class="stat-lbl">Sleep</div></div>
            <div class="stat-card"><div class="stat-val" style="font-size:17px;padding-top:3px;color:var(--green)">${sp}%</div><div class="stat-lbl">Sleep%</div></div>
          </div>
        </div>
        <div class="timeline-wrap"><div class="eyebrow">Sleep / wake timeline</div><div>${remoteTimelineHTML()}</div></div>
        ${msgBox('Message patient or family…')}
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="gc" style="padding:14px 16px;">
          <div class="eyebrow">Alert log</div>
          <div style="max-height:320px;overflow-y:auto;">
            ${S.nurseNotifications.length===0?'<div style="font-size:11px;color:var(--ink4);font-style:italic;padding:8px 0">Alerts appear here.</div>'
            :S.nurseNotifications.slice(0,16).map((n,idx)=>{
              const col=n.type==='eye'?'var(--green)':n.type==='sleep'?'var(--sleep)':n.type==='vcall_req'?'var(--purple)':n.priority==='high'?'var(--red)':'var(--amber)';
              const priCls={high:'pri-high',medium:'pri-med',low:'pri-low'}[n.priority]||'pri-med';
              return `<div class="gc notif-card" style="${n.acked?'opacity:0.45':''}">
                <div class="notif-icon" style="background:${col}22;border:1px solid ${col}55;"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" stroke="${col}" stroke-width="1.1"/></svg></div>
                <div style="flex:1;">
                  <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:2px;">
                    <div style="font-size:12px;color:var(--ink);font-weight:500">${n.title}</div>
                    <span class="pri-badge ${priCls}">${n.priority||'info'}</span>
                  </div>
                  <div style="font-size:11px;color:var(--ink3)">${n.sub}</div>
                  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px;">
                    <div style="font-size:10px;color:var(--ink4)">${n.ts}</div>
                    ${!n.acked&&n.type!=='vcall_req'?`<button onclick="S.nurseNotifications[${idx}].acked=true;render()" style="font-size:10px;padding:2px 8px;border:1px solid rgba(155,107,240,0.25);border-radius:6px;background:none;color:var(--ink3);cursor:pointer;">Ack</button>`:''}
                  </div>
                </div>
              </div>`;}).join('')}
          </div>
        </div>
        <div class="gc" style="padding:14px 16px;"><div class="eyebrow">Event log</div><div class="ev-list">${evHTML((S.events||[]).slice(0,7))}</div></div>
      </div>
    </div>
  </div>`;
}

function setRole(r){S.role=r;CH.postMessage({type:'ping',from:r});render();}

function render(){
  const app=document.getElementById('app');if(!app)return;
  const rpCls={patient:'rp-patient',family:'rp-family',nurse:'rp-nurse'}[S.role]||'rp-patient';
  const rpLbl={patient:'Patient room',family:'Family view',nurse:'Nurse station'}[S.role]||'';
  const unackCount=(S.nurseNotifications||[]).filter(n=>!n.acked).length;
  const stateSnippet=S.role==='patient'&&S.isMonitoring
    ?`<div class="pulse-dot pd-green"></div><span>${{awake:'Awake',asleep:'Asleep',blinking:'Blinking',unknown:'Detecting'}[S.sleepState]||'Live'}</span>`
    :S.role==='nurse'&&unackCount?`<div class="pulse-dot pd-amber"></div><span>${unackCount} unacked</span>`
    :S.role==='family'&&S.eyeState==='awake'?`<div class="pulse-dot pd-green"></div><span>Awake</span>`
    :S.role==='family'&&S.eyeState==='asleep'?`<div class="pulse-dot pd-blue"></div><span>Sleeping</span>`
    :S.role==='family'&&S.callState==='pending_nurse'?`<div class="pulse-dot pd-amber"></div><span>Call pending</span>`:'';
  const nav=S.role?`<nav class="topbar"><div class="logo" onclick="S.role=null;render()"><div class="logo-mark"></div><span class="logo-text">Vigil</span></div><div class="role-pill ${rpCls}">${rpLbl}</div><div class="tb-right">${stateSnippet}</div></nav>`:'';
  let body='';
  if(!S.role)body=renderRoleSelect();
  else if(S.role==='patient')body=renderPatient();
  else if(S.role==='family')body=renderFamily();
  else body=renderNurse();
  app.innerHTML=nav+body;
  if(S.role==='family'&&S.lastFrame)setTimeout(()=>drawFeedFrame('familyFeedCanvas'),50);
  if(S.role==='nurse'&&S.lastFrame)setTimeout(()=>drawFeedFrame('nurseFeedCanvas'),50);
  if(S.role)setTimeout(()=>{const ml=document.getElementById('msg-list');if(ml)ml.scrollTop=ml.scrollHeight;},60);
  updateMpChip();
  /* re-attach call overlay if active */
  if(S.callState==='active'&&(S.role==='patient'||S.role==='family'))showCallUI();
}

render();
setInterval(()=>{if(S.role)CH.postMessage({type:'ping',from:S.role});},4000);
setInterval(()=>{if(S.role==='patient'&&S.isMonitoring)updatePatientLive();},1000);
</script>
